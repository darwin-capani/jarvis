# find sources, web.open/open_url to surface one). All READ surface: a real run
# needs the web + the cloud and spends tokens, but it fetches and CITES — it
# never acts, and a citation always maps to a source it actually fetched (never
# an invented URL). recall_facts lets it ground a question against what the user
# already told JARVIS.
tools = ["conversation", "web.search", "web.open", "memory.recall", "web_search", "open_url", "recall_facts", "sage_research", "world_query", "skill_list", "skill_invoke"]
namespace = "agent.sage"

