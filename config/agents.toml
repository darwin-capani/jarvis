# Read-only / no-consequential surface. EDITH READS the signals it watches
# (calendar, mail metadata, system health, stored facts) and composes its own
# brief on demand; it never ACTS. The two edith_* tools are read-only. A
# consequential follow-up the user approves routes through the foundation gate
# at the owning agent, not here.
