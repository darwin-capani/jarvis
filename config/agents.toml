# voice — fitting the one who assembles the team.
voice = "am_eric"
# Deep navy-blue 235: distinct, commanding, on the cyan-navy FUI palette; never
# the reserved alert red. Sits between stark (205) and vision (265).
hue = 235
persona_file = "inference/personas/fury.txt"
# FURY is NOT an orchestrator-wildcard like jarvis. It holds an EXPLICIT mission
