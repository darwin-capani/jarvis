[[agent]]
name = "aegis"
role = "Defense & Privacy: checks your exposure and the machine's security posture"
# af_nicole: a real American-English female voice from the original Kokoro-82M set,
# distinct from every other roster voice — a calm, measured register that fits a
# security chief who reports the walls plainly ("I watch the walls; I tell you where
# you're exposed").
voice = "af_nicole"
# Steel-blue 210: distinct, calm and watchful, on the cyan-navy FUI palette; never
# the reserved alert red (red stays for alerts; ultron's identity hue is deep-orange
# 15). Sits between stark (205) and herald (220).
hue = 210
persona_file = "inference/personas/aegis.txt"
# DEFENSIVE-ONLY, READ-ONLY surface. Two reads, both safe — NEITHER touches the
# foundation gate because neither changes anything. aegis_breach_check reads the Have
# I Been Pwned catalog for the USER'S OWN email (defaulting to the user's stored
# address): it reports exposure, it cracks nothing and scans no other host; it needs
# the user's own HIBP API key (hibp_api_key) in Settings, and says so when missing.
# aegis_posture reads the LOCAL machine's security posture (FileVault, firewall, SIP,
# pending updates) with the same read-only system-command pattern the daemon already
# uses — it REPORTS; turning a protection on is the user's own action in System
# Settings. aegis_introspect reports the READ-ONLY introspection sentinel's view of
# jarvisd's OWN sandboxed micro-apps (SBPL profile-drift, RSS/CPU anomalies, unexpected
# dyld modules); it REPORTS only, never kills/unloads/changes a profile. NO offensive
# capability: the user's own email + own machine only. Aegis holds NO consequential/
# remediation tool, not even a gated one.
tools = ["conversation", "memory.recall", "recall_facts", "aegis_breach_check", "aegis_posture", "aegis_introspect", "aegis_report", "world_query"]
namespace = "agent.aegis"

[[agent]]
name = "babel"
role = "Translation & Interpretation: renders text between languages and interprets speech turn-by-turn (transcribe -> translate -> speak); continuous real-time live-mic interpretation is device-gated"
# af_jessica: a real American-English female voice from the original Kokoro-82M set,
# distinct from every other roster voice — a clear, even-handed register that fits a
# faithful interpreter who renders meaning straight ("Any tongue, rendered true").
voice = "af_jessica"
# Cyan-teal 155: distinct, calm and lucid, on the cyan-navy FUI palette; never the
# reserved alert red. Sits between steve (150) and vitalis (160), 5 degrees off each.
hue = 155
persona_file = "inference/personas/babel.txt"
# READ-ONLY surface. babel_translate renders `text` from one language to another by
# calling the ON-DEVICE LLM (the existing generate/brain path) with a faithful-
# translation prompt — it transforms text and reports the result; it stores nothing,
# sends nothing, and changes nothing, so it never touches the foundation gate.
# babel_interpret chains that SAME on-device translate with the daemon's echo-safe
# speech path: it renders one already-transcribed utterance into the target language
# and speaks the bare translation aloud (TURN-BASED interpretation).
# HONESTY: text/turn translation quality is bounded by the local ~4B model — competent,
# not a dedicated machine-translation system and not a professional translator — and
# CONTINUOUS, always-listening, real-time live-mic interpretation (two-way, hands-free)
# is DEVICE/AUDIO-gated and not wired here. Babel ships the text core + the turn-based
# interpreter and documents the continuous live-mic mode as the device-gated next step.
# Babel renders; it never composes original content (that is Veronica) and never sends.
tools = ["conversation", "memory.recall", "recall_facts", "babel_translate", "babel_interpret", "world_query"]
namespace = "agent.babel"
