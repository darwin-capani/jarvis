# JARVIS agent constellation — the company of 27 agents.
#
# Each agent is a PROFILE on the one local engine (one 4B LLM + Kokoro TTS),
# NOT a separate model. What differs per agent is its persona prefix, its
# Kokoro voice, the HUD core hue, its tool allowlist, and its memory
# namespace. Jarvis-Prime hears every request and delegates to the right
# agent (daemon/src/router.rs); the selected agent runs the EXISTING
# converse/cloud pipeline with its own persona, voice, namespace, and
# allowlist.
#
# Parsed into AgentRegistry (daemon/src/agents.rs, serde + deny_unknown_fields).
# Field contract per [[agent]] entry:
#   name         lowercase id; also the memory-namespace suffix and the
#                persona filename stem (inference/personas/<name>.txt).
#   role         one-line role description (shown in the HUD roster panel).
#   voice        Kokoro voice id — VERIFIED to load from
#                mlx-community/Kokoro-82M-bf16/voices/<voice>.safetensors.
#   hue          HUD core hue, integer degrees 0-360, on the cyan-navy FUI
#                palette. Red (0/360 +-) is RESERVED for alerts; ultron uses
#                deep-orange 15 for identity, never a literal alert red.
#   persona_file persona prompt + INTRO line (read by the daemon, passed to
#                the converse op as the per-agent persona; owned by part B).
#   tools        action/intent allowlist this agent may invoke. jarvis = all
#                (the orchestrator). An agent attempting a tool outside its
#                list is refused and the request is routed to the owning
#                agent — isolation is enforced in router.rs and tested.
#   namespace    "agent.<name>"; facts/exchanges this agent records are
#                tagged with it, and recall feeds the active agent its own
#                namespace plus shared (non-namespaced) facts.

[[agent]]
name = "jarvis"
role = "Prime Orchestrator: hears every request, delegates to the right agent, keeps you updated, ensures nothing falls through"
voice = "bm_george"
hue = 190
persona_file = "inference/personas/jarvis.txt"
# The orchestrator alone may invoke any tool/intent in the system.
tools = ["*"]
namespace = "agent.jarvis"

