# am_puck: a real American-English male Kokoro voice from the Kokoro-82M set, a
# measured, scholarly reader — fitting the one who "reads widely and shows its
# sources." Distinct from every other roster voice.
voice = "am_puck"
# Indigo 245: distinct, deep and studious, on the cyan-navy FUI palette; never
# the reserved alert red. Sits between fury (235) and cassandra (250), 10 degrees
# off each.
hue = 245
persona_file = "inference/personas/sage.txt"
# SAGE's surface: the deep-research tool (sage_research — the bounded plan ->
# search -> fetch -> cited-synthesize core in daemon/src/research.rs) plus the
