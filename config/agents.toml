[[agent]]
name = "cassandra"
role = "Forecast & Simulation: runs the numbers, models scenarios, reports the odds"
# af_aoede: a real American-English female Kokoro voice from the Kokoro-82M set,
# distinct from every other roster voice — fitting the probabilistic oracle
# archetype (a muse). The archetype is a NAME, not a claim of foresight:
# Cassandra models what could happen, she does not prophesy.
voice = "af_aoede"
# Steel-blue 250: distinct, cool and analytical, on the cyan-navy FUI palette;
# never the reserved alert red. Sits between fury (235) and vision (265).
hue = 250
persona_file = "inference/personas/cassandra.txt"
# READ-ONLY surface. Both cassandra_* tools are PURE simulations over the user's
# (or default) assumptions — no side effects, nothing sent or changed, so neither
# touches the foundation gate. Cassandra models what COULD happen under the
# inputs; she never acts and never promises an outcome will occur.
tools = ["conversation", "memory.recall", "recall_facts", "cassandra_forecast", "cassandra_simulate", "world_query"]
namespace = "agent.cassandra"

[[agent]]
name = "mnemosyne"
role = "Semantic Memory: recalls what you've told JARVIS and surfaces the relevant past"
# af_kore: a real American-English female Kokoro voice from the Kokoro-82M set
# (Kore, the maiden — like Mnemosyne, a Greek-myth figure used only as a NAME,
# not a claim), distinct from every other roster voice — fitting the precise,
# recollective archetype.
voice = "af_kore"
# Teal-cyan 130: distinct, calm and recollective, on the cyan-navy FUI palette;
# never the reserved alert red. Sits between gecko (120) and steve (150).
hue = 130
persona_file = "inference/personas/mnemosyne.txt"
# READ-ONLY surface. mnemosyne_recall RANKS the EXISTING stored memories and
# returns the relevant ones; it stores nothing, sends nothing, and changes
# nothing, so it never touches the foundation gate. The STORE half is pepper's;
# Mnemosyne is retrieval only. She also holds the generic recall_facts read tool.
# The ranking is lexical-semantic (BM25), NOT neural embeddings — the persona and
# tool copy say so; recall is keyword-semantic, not vector-semantic.
tools = ["conversation", "memory.recall", "recall_facts", "mnemosyne_recall", "episodic_recall", "world_query", "world_update", "user_model_query", "user_model_correct", "user_model_forget", "skill_list", "skill_invoke", "doc_search", "unified_search", "docsearch.index", "docsearch.forget", "docsearch.build_graph", "knowledge.build"]
namespace = "agent.mnemosyne"

