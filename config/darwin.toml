# DARWIN canonical configuration.
# Read by darwind and the inference server; both fall back to these exact
# values as hardcoded defaults if this file is missing.

[audio]
rms_threshold = 0.015   # RMS gate: below this is treated as silence
silence_ms = 350        # trailing silence that ends an utterance
min_speech_ms = 250     # discard blips shorter than this
barge_in = true         # let you interrupt DARWIN by talking over him
barge_in_rms = 0.06     # how loud you must be to cut him off — above his own echo
                        #   through the speakers. RAISE if he cuts himself off;
                        #   LOWER if barge-in won't trigger. The daemon LOGS your
                        #   mic level during playback ("barge: mic level …") — set
                        #   this to just under your interruption level.
barge_in_ms = 250       # accumulated loud time before he stops (dwell; brief
                        #   inter-word dips are tolerated, not reset)
sound_monitor = true    # Ambient sound monitor (task #15). SHIPS ON (full-power
                        #   default) — INERT WITHOUT MIC/TCC: it captures nothing
                        #   until you grant Microphone consent in System Settings;
                        #   the flag cannot grant it. When active (+ mic/TCC consent)
                        #   the daemon PERIODICALLY classifies a short ambient clip via
                        #   the Vision app's on-device classify.sound op (Apple Sound
                        #   Analysis, the fixed ~300-class classifier) and emits
                        #   sound-class events (doorbell/alarm/glass-break/…). Only
                        #   the LABELS leave the op — the AUDIO never leaves the
                        #   device. DISTINCT from STT. The one-shot "what was that
                        #   sound" intent (on a clip the daemon already captured)
                        #   works regardless of this flag. Set false to disable.
vad = "silero"          # Per-frame VAD backend: "silero" (the learned Silero VAD —
                        #   the default) or "rms" (the classic energy gate, explicit
                        #   opt-out). The learned VAD runs IN-PROCESS on the audio
                        #   thread (a pure-Rust port of the Silero v5 core, sub-ms
                        #   per 32ms frame; no IPC — a per-frame RPC was MEASURED
                        #   unsafe under load and rejected) and MEASURABLY beats the
                        #   RMS gate on false-accepts: loud non-speech (the tested
                        #   adversaries: synthesized broadband noise + keyboard
                        #   clicks) 83% -> 0% flagged as speech, zero false-reject
                        #   regression (inference/benchmarks/vad_eval/, synthetic-
                        #   but-representative). HONEST
                        #   fallback: its weights (state/models/, exported by the
                        #   inference server at preload) may be absent on a fresh
                        #   install — until then capture runs the RMS gate and SAYS SO
                        #   (vad.backend_fallback telemetry; vad.backend_live when the
                        #   learned path takes over). Debounce (silence_ms /
                        #   min_speech_ms) is identical for both backends.

[models]
llm = "mlx-community/Qwen3-4B-Instruct-2507-4bit"   # local generation (+ converse decode) (MLX, Metal GPU)
stt = "mlx-community/whisper-small-mlx"             # speech-to-text (MLX); ~4x faster than large-v3-turbo warm (335ms vs 1350ms on a 4.6s clip, M1 Pro)
classifier = ""                                     # dedicated small resident model for op=classify; "" = reuse llm. Every small candidate FAILED the 7-utterance accuracy gate (Qwen3-0.6B-4bit 4/7, Qwen2.5-0.5B-Instruct-4bit 4/7 + missed a heavy case, Llama-3.2-1B-Instruct-4bit 3/7; main 4B = 7/7) — only set this after a candidate passes >=6/7 with all heavy cases heavy
# MULTI-RESIDENT LOCAL warm-set (task #17). DEFAULT = SINGLE-RESIDENT (the safe, low-RAM state, exactly today's behavior): only `llm` is kept warm. Multi-resident is OPT-IN + RAM-BOUNDED — it lets the LOCAL tier keep a small "local-fast" model warm ALONGSIDE the base `llm` so it can swap INSTANTLY (no reload) on trivial offline turns. HONEST: two warm models cost ~2x RAM; the swap speed benefit is device/RAM-gated and is NOT a measured claim. It does NOT change routing safety or which TIER is chosen — only which already-warm LOCAL model answers an on-device turn.
local_warm = []                                     # OPTIONAL extra local model ids to keep warm beside `llm` (e.g. ["mlx-community/Qwen3-0.6B-4bit"]). Empty (default) = single-resident. RAM-bounded by local_budget_gib below; an extra is only kept warm while the estimated footprint stays within budget.
local_budget_gib = 0.0                              # RAM budget (GiB) the warm-set may occupy. 0 (default) or any non-positive value = SINGLE-RESIDENT (only `llm` warm). A positive budget admits extras up to that total (estimated footprint). Set conservatively for the Mac's actual free unified memory; if the base `llm` alone exceeds it, single-resident is kept (the base must stay warm).
# local_sizes = { "some/model-id" = 1.25 }          # OPTIONAL id -> approx resident GiB overrides for the budgeting estimate (used when the coarse param-count x quant heuristic would mis-size a model). Bad entries are dropped individually.

[speech]
engine = "kokoro"       # TTS engine: "kokoro" | "csm" (Sesame) | "orpheus". Adoption gate: warm RTF (synth_s/audio_s) <= 0.5 + clean load + survives silence trim. 2026-06-12 eval (M1 Pro 16GB, GPU idle, same audition line, WAVs in state/voice-samples/): kokoro/bm_george 0.069 PASS; csm-1b-8bit/conversational_b 0.931 FAIL; orpheus-3b-0.1-ft-4bit/leo 1.28 FAIL — both candidates also share the GPU with the 4B LLM in real use, so kokoro stays
model = ""              # explicit HF repo for the engine; "" = engine default (kokoro: mlx-community/Kokoro-82M-bf16, csm: mlx-community/csm-1b-8bit, orpheus: mlx-community/orpheus-3b-0.1-ft-4bit)
voice = "bm_george"     # British English male (DARWIN register); Kokoro voice ids encode the language in the first letter (bm_* = British male). csm voices: conversational_a/b (b = male); orpheus voices: leo/dan/zac male, none British
speed = 1.2             # kokoro only (csm/orpheus have no speed control); clipped, brisk delivery; 1.05 read as too slow in live use
sentence_pause_ms = 250 # pure silence the daemon inserts between consecutive clips in a reply (after the opener and between content sentences, never after the last); 120ms gapless playback read as rushed
opener_delay_ms = 300   # natural beat between end-of-utterance and the opener WAV; the daemon sleeps this inside the ReplySession while STT runs CONCURRENTLY (never serialized in front of transcription); first_audio_ms includes it. Only consulted when instant_opener = true
openers = ["Right away, sir.", "Of course.", "One moment.", "On it, sir.", "Let me see."]  # opener bank: synthesized to state/openers/opener-<idx>.wav at every server start (preload, after TTS warm); the daemon plays one the instant an utterance ends and maps filename index -> this list. Only used when instant_opener = true
instant_opener = false  # master gate for the canned instant acknowledgment. SHIPS OFF (owner preference): with it OFF you do NOT hear the fixed "Right away, sir." ack — the converse stream IS the whole reply and the persona greets/answers naturally from its first word. Set true to bring the instant task-ack back (pure UX, no safety surface; all the opener machinery stays intact either way).

[inference]
preload = true          # warm STT, LLM (+classifier prompt cache) and TTS in a background thread at server startup
speculative = true      # #37 SPECULATIVE/DRAFT DECODING — master gate. SHIPS ON (full-power default) — INERT WITHOUT A DRAFT MODEL: it ALSO needs a loadable draft_model below (ships empty); absent that, generate falls back to NORMAL gen and HONESTLY reports speculative=false (NEVER faked). Set draft_model to engage. The real speedup is device/model-dependent and only on-device.
draft_model = "mlx-community/Qwen3-0.6B-4bit"   # #37 small DRAFT checkpoint mlx_lm uses to propose tokens the main model verifies (canonical id = server.py DEFAULT_DRAFT; bundled by the installer). With speculative=true above + this checkpoint present + mlx_lm speculative support, speculative ENGAGES; the real speedup is device/model-dependent and on-device only. HONEST FALLBACK: if the checkpoint isn't downloaded or mlx_lm lacks speculative support, generate falls back to NORMAL gen and reports speculative=false (NEVER faked). Set back to "" to force normal gen.
quant = "auto"          # #39 SELECTABLE QUANTIZATION for the local model load. "auto" (default) == today's behavior (load as configured). Allowed: auto/fp16/int8/int4. An explicit value selects a matching variant; if absent the loader falls back + reports the quant that ACTUALLY loaded (never claims int4 when fp16 loaded). Unknown value => reported + kept "auto". Real RAM/speed/quality tradeoff is device-gated.
embedder = "coreml-bge-small-en-v1.5"   # op=embed BACKEND. DEFAULT = the purpose-built Core ML sentence embedder (BAAI/bge-small-en-v1.5, 384-dim, ANE-ELIGIBLE via Core ML; inputs tokenized to seq=512, bge's native max, covering docsearch's ~1200-char chunks). SEVERAL TIMES faster than the legacy mean-pool path AND much higher retrieval quality: latency ~6x single (19.6 vs 124 ms) / ~3x per text on a K=8 batch (19.0 vs 56.8 ms/text) at seq=512/ComputeUnit.ALL (re-measured in coreml_embed.py's smoke), recall@1/3/5 0.82/0.92/0.99 MRR 0.96 vs 0.25/0.46/0.56 MRR 0.42 (synthetic-but-representative; harness + set + results committed under inference/benchmarks/coreml_eval/). Convert-on-first-use (ATOMIC: validate-load then rename), cached under the HF model cache, warmed EAGERLY at server startup. HONEST FALLBACK: if it cannot be built/loaded (deps/conversion failure) op=embed serves the mean-pool path instead and REPORTS fell_back (embedder id + flag + log warn), never silently. Allowed CONFIG values: coreml-bge-small-en-v1.5 / llm-qwen3-4b-meanpool. The EMITTED wire space id is fixed for Core ML but MODEL-DERIVED for mean-pool (llm-meanpool:<llm_id>:<quant>[:<adapter>]) so an LLM/quant swap OR a promoted-LoRA promote/rollback changes the stamp; docsearch keys the vector SPACE by that id + dim. "ANE-eligible": Core ML schedules ANE/GPU/CPU at its discretion — only end-to-end latency is measured, never ANE residency.
reranker = true         # TWO-STAGE RETRIEVAL RERANK (stage two). SHIPS ON — the MEASURED winner: after the bge bi-encoder recalls the dense top-K, a Core ML cross-encoder (cross-encoder/ms-marco-MiniLM-L-6-v2, ANE-ELIGIBLE, ONE relevance logit per query-passage pair via op=rerank) re-scores the top-20 and recall / doc_search / unified_search re-order by it (RankMethod::Reranked). On the committed synthetic-but-representative eval (harness + results under inference/benchmarks/coreml_rerank_eval/): nDCG@10 0.955->0.984, recall@1 0.82->0.87, recall@3 0.92->0.98, MRR 0.96->0.99; rerank latency ~221 ms/query at K=20 (K=50 was the SAME quality at ~2.5x the cost, so K is bounded to 20). READ by BOTH sides: the daemon gates whether to CALL op=rerank, the server whether to WARM the cross-encoder at preload. Convert-on-first-use (ATOMIC), cached under the HF model cache. HONEST FALLBACK: off / unbuildable => the dense order stands with stage one's own method; SERVER DOWN => the embed op also fails, so stage one is BM25 (method Lexical, NOT Embedding). When the rerank DOES run it labels the TRUE stage one: RankMethod::Reranked over a neural-embedding base, RankMethod::LexicalReranked over a BM25 base — never a BM25 result mislabeled as neural. "ANE-eligible": Core ML schedules ANE/GPU/CPU at its discretion — only end-to-end latency is measured, never ANE residency. Set false to disable the second stage (dense-only).

[power]                  # #38 BATTERY/THERMAL ADAPTIVE THROTTLING. PERF/RUNTIME ONLY: influences only the LOCAL model sub-choice (prefer the cheaper Fast warm model + defer heavy work) on low battery / serious thermal pressure. NEVER loosens a gate, never makes a cloud call.
adaptive = true         # master gate. SHIPS ON (full-power default). PERF-ONLY: the conservative policy may prefer the cheaper local Fast sub-tier + defer heavy work on low battery (discharging) or serious/critical thermal pressure. Never loosens a gate, never makes a cloud call. The live pmset/thermal read is DEVICE-GATED behind this flag. Set false to disable.
low_battery_pct = 20    # #38 discharge threshold: below this % ON BATTERY, prefer the cheaper local Fast sub-tier + defer heavy work. On AC + nominal thermal the policy never throttles regardless.

[snapshot]               # SAFETY SNAPSHOT — APFS restore-point anchoring in the reversible journal. Before a consequential, hard-to-reverse step (a self-heal apply, a consequential mission step) DARWIN takes a bounded, device-gated `tmutil localsnapshot` and records the resulting APFS restore point into the journal so "undo that" can name a concrete OS-level rollback target.
enabled = true           # SHIPS ON (armed-by-default). BENIGN-ONLY: snapshot CREATION writes/deletes NONE of your data (a COW APFS marker macOS thins automatically). RESTORE is NEVER automated — DARWIN only SURFACES the restore point + the exact user-run `tmutil` command; it never rolls back on its own. INERT WITHOUT APFS: a non-APFS / no-space / no-permission volume degrades to an honest "would-have" and changes nothing. Set false to disable.

[procwatch]              # PROCESS OBSERVATORY — a STRICTLY READ-ONLY poll of the LIVE process table -> one bounded, SECRET-FREE `system.processes` frame for the HUD (total count, top-N by CPU/memory, new-since-last-poll, load average). The wire carries process NAME + pid (+ ppid/uid) ONLY — NEVER argv/command line, NEVER environment, NEVER open files/paths (those routinely carry secrets). SECRET-FREE AT THE SYSCALL BOUNDARY, by construction: the collector issues only per-pid fixed-size libproc struct reads (PROC_PIDTBSDINFO/PROC_PIDTASKINFO + proc_listallpids + getloadavg) — the kernel's argv/env block (KERN_PROCARGS2) and every path flavor are never requested, so no argv/env byte ever transits daemon memory. It OBSERVES only: no kill/signal/renice code path exists. Orthogonal to the Persistence Sentinel (persistence.rs watches AUTOSTART surfaces for changes; this is the live table).
enabled = true           # master gate. SHIPS ON (armed-by-default; strictly read-only + secret-free, so safe to enable outright). OFF => the poll never spawns and the HUD panel stays honestly empty. Set false to disable.
poll_secs = 10           # snapshot cadence in seconds. Clamped at read time to a sane floor (>= 2) so a hostile/typo'd 0 can't busy-spin the poll. CPU % is a TWO-SAMPLE delta across consecutive polls: the first poll honestly reports cpu as unknown (null; empty top-CPU list), never a fabricated 0.0 — real deltas from the second poll on.
top_n = 12               # rows per top-CPU / top-memory list. Hard-capped at 32 at read time so a hostile/typo'd value can never flood the frame.

[obol]                   # OBOL — CLOUD-SPEND LEDGER + DOLLAR-CAP ROUTING BUDGET. A durable, bounded, SECRET-FREE spend ledger (one row per cloud call: model + token counts + $ estimate + agent + ts) fed from the SAME point eval.rs records cloud usage. The budget is REDUCE-ONLY: Override > Budget-floor > Auto > Fallback — it can ONLY step a near/over-cap turn DOWN to a cheaper/on-device tier. It NEVER loosens a gate, NEVER escalates to a pricier model, and NEVER blocks a call you EXPLICITLY force (a voice/HUD override beats the budget-floor).
daily_usd_cap = 0.0     # daily cloud-spend cap in USD. SHIPS 0.0 == NO CAP (INERT): budget_pressure is always None, so routing is byte-for-byte today's; the ledger still records honest accounting. Set a positive value to arm the budget-floor — at ~80% of the cap a Heavy turn eases down to Fast; at/over the cap the turn is floored to the on-device Local path (no further cloud spend). It only ever routes cheaper.

[report]                 # #40 REPORT GENERATION. READ-ONLY/PRESENTATION: folds the agent-scoped, ALREADY-CITED notebook/research material into one BOUNDED markdown report under research.rs's cite discipline. NEVER fabricates a source/citation/body; no citable source => an HONEST-EMPTY report. Speaks/displays only — acts/reaches nothing.
enabled = true          # master gate. SHIPS ON (full-power default). The read-only op pulls the saved cited runs on X and assembles a bounded report citing ONLY their real sources (honest-empty when none). Speaks/displays only — safe to enable outright. Set false to disable.

[chart]                  # #41 DATA -> CHART. NEUTRAL PRESENTATION: serializes a ChartSpec (the EXACT data points) as a `chart.data` telemetry envelope the HUD plots exactly — no interpolation, no invented/extrapolated point, honest axes + honest-empty. Changes no gate, takes no action, reaches no network.
enabled = true          # master gate. SHIPS ON (full-power default). "chart this"/"plot the system load" surfaces the latest REAL system snapshot's exact cpu/mem values as a chart.data envelope (honest-empty when no reading is available yet). Changes no gate, reaches no network — safe to enable outright. Set false to disable.

[artifact]               # ARTIFACT REGISTRY + PEEK (artifact.rs). Producers register the last N things they made (report / chart / code_diff / …) into a BOUNDED, in-memory, on-device recency window with HONEST provenance (real producing agent + real citations, or UNCITED). The read-only `peek` surface ("what did you just do" / "peek", + the `artifact_peek` tool) reads them back out as an `artifact.peek` frame the HUD's QuickLook overlay renders. Opens NO outward surface, takes NO action, reaches NO network.
enabled = true          # master gate. SHIPS ON (armed-by-default) — read-only, on-device accountability; arming it loosens nothing. Off => producers register nothing and peek finds nothing. Set false to disable.
registry_size = 32      # retention bound: the registry keeps this many most-recent artifacts, then evicts the oldest. Clamped into [1, 256].

[boundary]               # CUSTOMS // EGRESS (boundary.rs). A PRE-FLIGHT egress boundary gate: before a CLOUD turn goes out, CUSTOMS builds a READ-ONLY manifest of exactly the personal context about to be sent (facts / history / world rows / persona / system prompt), classifies each by sensitivity + size, and emits it as a `boundary.manifest` frame. INSPECTS + (reduce-only) TRIMS; it never mutates, never sends, and never touches the LOCAL inference path (which egresses nothing off the box).
enabled = true          # master gate for the pre-flight manifest. SHIPS ON (full-power default) as a NEUTRAL READ-ONLY preview of cloud egress. Off => the cloud turn is byte-for-byte today's (no manifest computed/emitted). Set false to disable.
default_trim = "none"   # the default REDUCE-ONLY trim on every cloud turn. SHIPS "none" (the IDENTITY — send everything, today's behavior). "no_facts" withholds the remembered FACTS; "no_memory" withholds FACTS + conversation HISTORY. A trim can ONLY withhold whole categories, never add one; an unknown value degrades to "none". A per-turn voice command can override this for a single turn.
[vault]                  # VAULT MODE ("go dark", vault.rs) — a one-word forcing switch that keeps a turn LOCAL-ONLY for sensitive work. Where CUSTOMS ([boundary]) trims the cloud egress, Vault removes the cloud turn ALTOGETHER: the router refuses to escalate to the Anthropic fallback (the turn stays on the local MLX brain, or honestly says it can't do this offline) and CUSTOMS is forced to its maximal reduce-only trim. RESTRICT-ONLY: vault can only remove cloud + tighten the trim, never add either. Toggled at runtime by a `vault` op or a spoken "go dark" / "vault mode on|off".
enabled = false         # boot default for vault mode. SHIPS OFF — vault CHANGES behavior (it removes cloud access), so it is opt-in and never engages silently. Runtime toggles flip the live mode; this only sets the state at startup. Set true to boot dark.
[egress]                 # EGRESS BASELINE + BEACON DETECTOR (egress_beacon.rs) — the longitudinal follow-on to the read-only Egress Sentinel. Samples the SAME lsof outbound snapshot, keeps a BOUNDED baseline, and runs two PURE classifiers: first-seen talker + regular-interval beacon cadence (the C2-callback signature). READ-ONLY. Any "block" is PROPOSE-ONLY: a pf rule rendered as TEXT you apply yourself with sudo — the loop NEVER mutates the firewall. UID-scoped: unprivileged lsof sees only same-UID processes (stated in every alert frame). Alerts RIDE EDITH's quiet-hours (from [proactive]) + cooldown + debounce so they never spam.
enabled = true              # master gate. SHIPS ON (full-power default) — pure read-only observability, like [introspect]/[audit]. With it false the sampling loop is simply not spawned. Set false to disable.
startup_delay_secs = 45     # wait this long after boot before the first sample (let the host settle)
sample_interval_secs = 60   # seconds between outbound-connection samples. Beacon-cadence resolution is bounded by this: a beacon that opens AND closes entirely between two samples is invisible to snapshot sampling (an honest limit, not a bug).
retention_secs = 86400      # a talker unseen for longer than this (seconds) is pruned from the baseline (1 day; bounded retention)
max_talkers = 2048          # hard cap on distinct talkers held; the least-recently-seen is evicted when a new talker would exceed it (bounded memory)
max_samples_per_talker = 64 # ring cap on rising-edge timestamps kept per talker (bounded memory)
beacon_min_samples = 6      # minimum rising-edge timestamps before a beacon-cadence verdict is trusted (=> 5 intervals)
beacon_min_interval_secs = 30    # mean inter-arrival at/above this — below it a series is bursty reconnection noise, not a beacon
beacon_max_interval_secs = 3600  # mean inter-arrival at/below this — above it the cadence is indistinguishable from ordinary slow polling at our sample resolution (1 hour)
beacon_max_jitter = 0.15    # coefficient-of-variation ceiling (stddev/mean of the deltas). A tight, regular cadence sits well below this; a jittery/random one blows past it.
alert_cooldown_secs = 21600 # per-talker alert cooldown (seconds): don't renag on the same host (6 hours)
alert_min_gap_secs = 300    # global debounce (seconds): never two egress alerts closer than this (5 minutes) — on top of EDITH quiet hours

[precog]                 # PRECOG // WHAT-IF (simulate.rs) — the counterfactual command simulator. A "what would you do if I said X" query runs the SAME pipeline the live turn would (classify -> selector -> agent -> model tier -> confirmation-gate projection -> reversibility) UP TO but NEVER THROUGH the gate, and returns a PlannedOutcome as a `precog.plan` frame + a spoken summary. READ-ONLY by CONSTRUCTION: the simulate path holds NO actuator / memory-write / inference handle (SimContext carries only read views), so it CANNOT fire an action even a benign one — it only describes what a real run would do (and that it would PARK for your spoken yes).
enabled = true          # master gate. SHIPS ON (full-power default) — armed by default because PRECOG is read-only (it describes, it never acts), like [introspect]/[audit]. With it false the "what would you do if I said ..." cue falls through to ordinary routing (just another question). Set false to disable.

[screen_context]         # #42 CONTINUOUS SCREEN CONTEXT — the MOST privacy-sensitive read feature. A bounded/redacted/transient in-RAM ring of recent on-screen OCR snapshots, fed by a DEVICE-gated continuous capture loop, recallable ("what was I working on") + forgettable ("forget my screen context"). Glyph-only, never a face/identity; pixels never leave the device; READ-ONLY.
enabled = true          # master gate. SHIPS ON (full-power default), the MOST privacy-sensitive read — INERT WITHOUT TCC: the continuous capture loop STILL requires runtime macOS Screen-Recording consent; the flag cannot grant it, so without consent it captures NOTHING (the ring never grows, no WATCHING indicator fires). The ring stays redacted + transient (off lifelong memory / optimizer / disk) + bounded (cap below) + forgettable, with the WATCHING indicator. Set false to disable.
interval_secs = 30      # cadence the device-gated loop grabs ONE frame (floored to >= 1). A calmer/faster watch.
cap = 50                # HARD bound on the in-RAM ring — past it the OLDEST snapshot is evicted (no unbounded accumulation, no disk-spill). Floored to >= 1.

[vision]                 # On-device VISION-LANGUAGE model (VLM) describe path (distinct from OCR read.screen).
enabled = true          # master gate. SHIPS ON (full-power default) — INERT WITHOUT A MODEL: with `model` empty the describe op returns honest vlm_unavailable (never fabricates). Needs mlx-vlm + a multi-GB Qwen2-VL-class checkpoint + RAM; pixels stay on-device. Set false to disable.
model = "mlx-community/Qwen2-VL-2B-Instruct-4bit"   # canonical on-device VLM repo id (= server.py DEFAULT_VLM; bundled by the installer). With this present + mlx-vlm installed + enough RAM, op=describe_image ENGAGES; the pixels stay on-device. HONEST FALLBACK: if mlx-vlm isn't installed or the checkpoint isn't downloaded, the op returns vlm_unavailable (never fabricates). Set back to "" to force honest unavailable.

[image]                  # On-device TEXT->IMAGE generation (MLX diffusion, 100% on-device; NO cloud image API).
enabled = true          # master gate. SHIPS ON (full-power default) — INERT WITHOUT A MODEL: with `model` empty the op returns honest image_model_unavailable (never fabricates). Needs an MLX diffusion pkg + a multi-GB FLUX.1-schnell-class checkpoint + RAM. Set false to disable.
model = "schnell"       # canonical on-device diffusion model (= server.py DEFAULT_IMAGE_MODEL). "schnell" is an mflux ALIAS for the FLUX.1-schnell weights (the installer pre-downloads black-forest-labs/FLUX.1-schnell, which mflux's resolver maps this alias to). With this set + the mflux diffusion package installed + enough RAM, op=generate_image ENGAGES, 100% on-device (NO cloud image API). HONEST FALLBACK: if mflux isn't installed or the weights aren't present, the op returns image_model_unavailable (never fabricates). Set back to "" to force honest unavailable.

[distill]                # SELF-DISTILLATION (distill.rs) — a personal LoRA adapter learned from YOUR OWN graded conversations, on-device via mlx_lm.lora. SHIPS OFF (training mutates weights). Promotion (making an adapter the live generation model) is GATED on a MEASURED held-out win — never UNMEASURED (with auto_promote below it can chain automatically after training, still only on a measured win; ships OFF).
enabled = false          # master gate. SHIPS OFF: a distill run trains + STAGES an adapter under state/lora/ and stops. On-device training needs Apple Silicon + mlx-lm (verified only on-device; the daemon never fabricates readiness). Turn on to build an adapter from turns you did NOT redirect (an honest "kept answer" signal; every prompt/response is REDACTED first).
auto_promote = false     # SHIPS OFF. When true, a successful `distill` run also runs the promotion EVAL (base vs adapter held-out loss over the run's test split) and promotes the adapter ONLY IF it beats base by `min_improvement`. When false (default), training stages the adapter and you promote deliberately. A NO-GO (adapter no better) is a valid result: whatever is CURRENTLY live stays live (base, or a still-valid previously promoted adapter), the new adapter stays staged, and the measured Δ is recorded.
min_improvement = 0.05   # minimum held-out loss reduction (base - adapter, nats/token) required to promote. The gate ALWAYS requires a STRICT win (a tie or a regression never promotes, even at 0); this margin additionally keeps noise on a tiny personal split from flipping the live model. Must be >= 0 (a negative value fails closed: nothing promotes). Promotion is REVERSIBLE (roll back to base). The held-out split is small, so this is a coarse fit signal, honestly labeled — not a broad quality benchmark.
base_model = "mlx-community/Qwen3-4B-Instruct-2507-4bit"   # the checkpoint the adapter attaches to. MUST match the inference server's resident `llm` (an adapter is only valid for its base) — the server loads a promoted adapter only when its manifest base_model matches, else honestly serves base.
iters = 200              # bounded mlx_lm.lora training steps per run.

[interpret]              # #30 CONTINUOUS LIVE INTERPRETATION. The device-gated mic loop feeds each VAD segment through the PURE interpret pipeline.
live = true             # master gate. SHIPS ON (full-power default) — INERT WITHOUT TCC/MIC: the per-segment pipeline runs from the device-gated mic loop, so without Microphone consent it interprets nothing. Quality is bounded by the local ~4B model; offline degrades honestly (never a fabricated translation). Set false to disable.
speak = false           # render-only by default — voicing the translation stays its OWN opt-in (set true to also speak each rendered translation through the echo-safe speech path).
source_lang = ""        # SOURCE language to interpret FROM. Empty => auto-detect (the translator is told the source is unknown — never claims a source it only guessed).
target_lang = "English" # TARGET language to interpret INTO.

[captions]               # HERALD-EARS LIVE CAPTIONS (captions.rs). The transcript path turns each utterance into a `captions.line` stream for the HUD's LIVE CAPTIONS band.
enabled = false         # master gate. SHIPS OFF (opt-in) — with it off the transcript path emits no captions.line and the HUD band shows nothing. When ON it is READ-ONLY DISPLAY, reuses the EXISTING mic/TCC grant (no new recording), and is INERT WITHOUT MIC/TCC. Set true to show live captions.
translate_to = ""       # TARGET language to translate each caption line INTO, via the on-device Babel path. Empty => passthrough (captions show the transcript text, no translation). A non-blank value adds an on-device translation per line; offline degrades honestly (line still shows, translation omitted — never fabricated).
source_lang = ""        # SOURCE language of the captioned speech. Empty => auto-detect (never claims a source it only guessed). Only consulted when translate_to is set.

[wake]                   # #32 CUSTOM WAKE-WORD. The configured phrase that gates "is this utterance for DARWIN".
enabled = true          # master gate. SHIPS ON (full-power default) — since `phrase` defaults to "darwin", behavior is identical to today unless you change the phrase. The always-listening loop that consults the matcher is DEVICE-GATED (mic/TCC). Set false to disable wake-word gating.
phrase = "darwin"       # the wake phrase (case/punct/whitespace-insensitive + small edit-distance tolerance; an empty/blank phrase NEVER matches — fail-safe).

[shell]                  # #43 SANDBOXED SHELL / TERMINAL — the HIGHEST-RISK capability (arbitrary command execution).
enabled = true          # master gate. SHIPS ON (full-power default). Even ON it NEVER auto-runs: shell_run is in CONSEQUENTIAL_TOOLS + NEVER_AUTO_APPROVE_TOOLS (parks per-action even under an "Always" policy), clears a destructive denylist pre-exec, and execs only under allow_consequential + confirm + voice-id + !lockdown in a deny-default sandbox-exec profile. INERT WITHOUT DEVICE SUPPORT: exec needs /usr/bin/sandbox-exec + /bin/sh. Set false to disable.

[realm]                  # SCRATCH REALMS (realm.rs) — a disposable, confined build+test sandbox that VERIFIES a code_propose_diff proposal BEFORE a human applies it.
enabled = true          # master gate. SHIPS ON (full-power default) — INERT WITHOUT DEPS: a Realm needs an allowlisted [code].roots repo (the tree it COW-copies) AND [shell].enabled (it reuses the sandboxed-exec seam). The realm is a network-denied COW copy under state/realms/<ts>/; the daemon READS your tree to copy it but NEVER writes the real tree (apply-to-real stays the separate human-gated apply_code_diff.sh). A `passed` verdict means the build/test REALLY ran and exited zero; the sandbox unavailable / a non-applying diff => an honest UNVERIFIED, never a faked pass. Set false to disable.
verify_command = ""     # the build/test command run INSIDE the realm (e.g. "cargo test --offline"). SHIPS EMPTY — the realm is network-denied, so name a command that builds/tests OFFLINE (pre-fetched deps). Empty => an honest UNVERIFIED verdict (nothing to run), never a faked pass.
timeout_secs = 300      # wall-clock cap (seconds) for the realm build/test. Compiling from source in a fresh realm is slow, so this is generous (5 min): a too-short bound makes every real build time out to UNVERIFIED, defeating the point. The setup steps (COW copy + git apply) have their own separate bound.

[plan]                   # PLAN-APPLY (plan.rs) — upgrades the cross-turn confirmation PREVIEW to a structured, STATE-BOUND field-level DIFF for the consequential tools whose effect is a concrete state change (connector_add, standing_create).
enabled = true          # master gate. SHIPS ON (armed-by-default). The diff is bound to a hash of the CURRENT relevant state; at confirm time the hash is recomputed and the action proceeds ONLY if it still matches, else it RE-PARKS a fresh plan ("the state changed since I showed you") — TOCTOU-safe. STRICTLY ADDITIVE: the state-hash is an EXTRA precondition on TOP of allow_consequential + a fresh spoken confirm + voice-id + !lockdown; it can only make the gate STRICTER, never replace a check. With it false (or a tool with no structured planner) the confirmation uses today's text preview, byte-for-byte unchanged. Emits a `plan.diff` telemetry frame the HUD PLAN // DIFF panel renders. Set false to disable.

[ui_automation]          # #44 GATED UI AUTOMATION (the CAPSTONE) — the SINGLE MOST DANGEROUS capability (physically actuating the macOS UI).
enabled = true          # master gate. SHIPS ON (full-power default). Even ON it NEVER auto-runs: ui_actuate is in CONSEQUENTIAL_TOOLS + NEVER_AUTO_APPROVE_TOOLS (parks PER ACTION — one confirm = one actuation; a second re-parks — even under "Always"), fires only under allow_consequential + confirm + voice-id + !lockdown, never batched. INERT WITHOUT TCC: the CGEvent/AX post needs Accessibility consent (runtime, not SBPL-grantable) + a real display. Set false to disable.
actuate_via_app = false # OPT-IN (SHIPS OFF). false => the daemon posts the approved single CGEvent LOCALLY (existing behavior, byte-for-byte unchanged). true => the approved action is sent to the HUD app (DARWIN.app) over state/ipc/actuate.sock and the HUD posts the CGEvent, so macOS attributes the Accessibility grant to DARWIN.app and shows the clean prompt. EVERY gate (planner, confirm, master switch, voice-id, lockdown, dry-run) runs first, unchanged; only WHERE the approved post lands differs. In via_app mode the daemon's own Accessibility check is skipped (the HUD holds the grant); the HUD reports an honest failure when not trusted.

[webhooks]               # #35 INBOUND WEBHOOK TRIGGERS — the most security-sensitive inbound surface.
enabled = true          # master gate. SHIPS ON (full-power default) — INERT WITHOUT MAPPINGS + SECRET: `mappings` ships EMPTY (an unmapped event is rejected, never guessed) and the HMAC secret resolves from the Keychain (account webhook_hmac_secret, NEVER this file). The bind stays loopback (a non-loopback bind is refused). A mapped CONSEQUENTIAL intent still PARKS for a spoken confirm — a webhook can never auto-execute. Add mappings + set the Keychain secret to use. Set false to disable.
bind = "127.0.0.1"      # loopback-ONLY listen address; a non-loopback value is refused at bind time.
port = 8723             # loopback receiver port.
max_body_bytes = 65536  # hard cap on a received request body (a larger body is rejected, never buffered).
# mappings ship EMPTY (an unmapped event is rejected). Example (commented):
# [[webhooks.mappings]]
# event = "ci.failed"          # the external X-Darwin-Event / event name this entry maps
# intent = "system.query"      # the DARWIN intent it routes to (a consequential intent still PARKS for a spoken confirm)

[plugin_sdk]             # #36 PLUGIN SDK — the micro-app capability-module contract validator + register-on-launch handshake.
enabled = true          # master gate. SHIPS ON (full-power default): the live handshake scopes a plugin's declared intents/tools. A plugin still can't request a capability outside the allowed set (the validator rejects over-privileged manifests), can't escape the default-deny SBPL profile, and any consequential tool it exposes still rides the gate. The validator is pure and always available regardless. Set false to disable the live handshake.

[router]
cloud_confidence_threshold = 0.6   # route to cloud iff complexity == "heavy" OR confidence < this
conversation_route = "cloud_heavy" # where casual chat/greetings/opinions (the CONVERSATION intent) are answered. "cloud_heavy" (default): cloud Opus ([cloud].heavy_model) — the local 4B is near-deterministic on bare greetings, so chat goes to the cloud for genuinely varied, human personality; "cloud_fast": cloud Haiku ([cloud].fast_model); "local": the resident 4B (offline/Hulk path). Cloud variants need the cloud key; with no key (or on a cloud error) conversation degrades to the local 4B. One line flips the brain that answers chat. Actions, system.query, memory ops, and heavy/low-confidence cloud routing are unaffected.

[local_tools]                       # the OFFLINE bounded tool-loop: when the conversation tier resolves to Local ("work offline" override / no cloud key / cloud unreachable), give the on-device 4B BOUNDED agency over a CURATED SAFE LOCAL-TOOL subset (local read/compute only — memory recall, doc/episodic/world reads, skills, status, file-read — NEVER outward/cloud tools). Each tool runs through the SAME gated execute_tool, so the consequential confirmation gate, voice-id, lockdown and per-action policy ALL still apply offline (a consequential tool parks/refuses exactly as online). The 4B is less reliable at tool-calling than cloud Opus (a real ceiling) — the loop is bounded and falls back to a plain answer. Online behavior is unchanged.
enabled = true                      # engage the offline tool-loop at all; false => Local-tier chat answers with a plain converse (no tool use)
max_rounds = 3                      # hard ceiling on (prompt -> tool) rounds before forcing a plain text answer; clamped to 6 max — never unbounded
subset = []                         # OPTIONAL allow-list override; empty = the built-in curated safe subset. A non-empty list is INTERSECTED with the safe set, so it can only NARROW (never reach an outward/cloud tool).

[cloud]
fast_model = "claude-haiku-4-5"    # default cloud model (exact id, no date suffix)
heavy_model = "claude-opus-4-8"    # used when complexity == "heavy" (exact id, no date suffix)
max_tokens = 4096

[proactive]
enabled = true      # first-contact brief: after an away gap the next reply opens with verified context (time of day, system status, matching user.habit.* facts, pending heal proposal, facts learned while away)
idle_gap_hours = 4  # away gap (vs meta.last_interaction, unix-secs) that triggers the brief
# EDITH anticipation (anticipate.rs): the daemon surfaces what matters UNPROMPTED.
speak = true        # master gate for SPOKEN proactivity, SHIPS ON (full-power default): EDITH ALSO voices the brief — strictly through the existing echo-safe speech path (is_speaking/MUTE_TAIL/barge cover it) and never while already speaking — in addition to the HUD proactive card. Set false for HUD-card-only.
suggest = true      # proactive-intelligence suggester (habit detector #13 + predictive suggester #14, proactive_intel.rs) master gate, SHIPS ON (full-power default) — its OWN switch, NOT piggybacked on `enabled` above. When on it SURFACES observed-pattern suggestion cards — accepting a habit offer still routes through the gated standing_create confirmation; DARWIN never auto-acts. Set false to silence the suggestions feed.
lead_minutes = 15   # surface a calendar event this many minutes away (or nearer)
unread_floor = 3    # surface important-unread mail at or above this count
quiet_start = 22    # quiet-hours band start (local hour, 0-23); within [start,end) EDITH stays fully silent — no card either. Wraps midnight when start > end.
quiet_end = 7       # quiet-hours band end (local hour, exclusive); quiet_start == quiet_end disables quiet hours

[focus]                  # #24 FOCUS PROFILES (focus.rs). A PERMISSION-NEUTRAL lens over the proactive surfaces: it only narrows WHICH non-consequential intel surfaces (signal categories, brief verbosity, whether suggestions are quieted) and can ONLY make DARWIN quieter — never loosen the master switch / confirm gate / voice-id / lockdown / policy, never enable a consequential action, never raise autonomy.
profile = "default"      # SHIPS NEUTRAL: "default" is the IDENTITY — today's proactive behavior byte-for-byte. Other values: "work" (silences news/routine/market, keeps calendar/mail/health), "sleep" (only CRITICAL surfaces, suggestions quieted), "deep_focus" (only critical, no digest, suggestions quieted), or any other string = a NAMED CUSTOM profile (itself restrict-only). An unknown value degrades to "default" (fail safe to today's behavior). Critical signals (imminent calendar / low disk) survive even deep_focus — the floor a profile can never silence.
auto = false             # AUTO-FOCUS (focus.rs select_profile), SHIPS OFF (opt-in). When true, the LIVE anticipation tick RESELECTS the active profile each tick from ON-DEVICE signals — acoustic scene (scene.rs) + fused presence (presence.rs: Away/Present/Focused) + calendar (in a meeting?) + time-of-day — instead of holding `profile`: away/in-a-call/in-a-meeting -> deep_focus (quiet), night -> sleep, silent flow -> work, quiet room + present -> default (normal). PERMISSION-NEUTRAL by construction: the auto choice is applied through the SAME restrict-only apply_profile path, COMPOSED ON TOP of `profile`, so it can only ever NARROW further — never broaden past your configured profile, enable an action, raise autonomy, or loosen a gate. Opt-in because it changes what surfaces based on sensed room state. OFF = focus behaves exactly as today. (The acoustic-scene classifier ships inert — no bundled model — so live the scene input is Unknown and selection rides presence/calendar/time until scene.rs's capture tap is wired.)

[self_heal]
enabled = true    # master gate, SHIPS ON (full-power default) — INERT WITHOUT A CLOUD KEY: the heavy-model unified-diff draft requires ANTHROPIC_API_KEY; with no key the watchdog emits heal.blocked{reason:"no_api_key"} and patches NOTHING (needs the key to actually draft). When active: edge-triggered ERROR burst (or a single total-loss "audio capture stopped" line) -> collect last ~80 daemon.log lines + implicated src/<file>.rs paths -> heavy-model unified-diff draft -> staged copy of daemon/ under state/heal/staging-<ts>/ -> /usr/bin/patch -p1 + cargo check + cargo test (10min cap) -> propose per mode below. Rate-limited to one draft attempt per 6h (meta.heal_last_attempt); failures land in state/heal/rejected/<ts>/. Set false to disable.
mode = "propose"  # "propose" (default): write the validated patch + report to state/heal/proposals/<ts>/, stamp meta.heal_pending, and wait for a human to run scripts/apply_heal.sh <ts>. "auto" is DANGEROUS and additionally requires enabled = true: the daemon applies the validated patch to daemon/ itself, rebuilds --release, and EXITS cleanly so its supervisor restarts it (under launchd KeepAlive that is a restart; under `cargo run` it is a stop). Unknown values behave as "propose".

[forge]
# Self-Forge (forge.rs): DARWIN AUTHORS A NEW sandboxed micro-app from a goal —
# the self-heal gated-codegen pattern generalized from "patch the daemon" to
# "build an app". Same propose-only contract as [self_heal] (now armed by default).
enabled = true    # master gate, SHIPS ON (full-power default) — INERT WITHOUT A CLOUD KEY: forge_draft requires the cloud key (emits forge.blocked{reason:"no_api_key"} otherwise). When active: forge_draft(goal) asks the heavy cloud model to author a complete micro-app (manifest with MINIMAL permissions + source file(s) + tests) -> stage to state/forge/staging-<ts>/ (NEVER apps/) -> validate the manifest (safe name, permissions on the allowed minimal set, default-deny SBPL generates) + build/test the app under a timeout cap -> on pass, PROPOSE to state/forge/proposals/<ts>/ + stamp meta.forge_pending and STOP; on fail, quarantine to state/forge/rejected/<ts>/. The proposed app is NOT in apps/, NOT registered, NOT running. Set false to disable.
mode = "propose"  # "propose" (default): write the validated app + report to state/forge/proposals/<ts>/, stamp meta.forge_pending, and wait for a human to run scripts/apply_forge.sh <ts>. "auto" (additionally requires enabled = true) ONLY governs the forge's own staged artifact — IT NEVER DEPLOYS. DEPLOYING a forged app into apps/ (where AppRegistry::discover would pick it up and run it on next start) is ALWAYS a separate human step: there is no auto-deploy path in the daemon, period. Unknown values behave as "propose".

[envlock]
# SUBSTRATE LOCK (envlock.rs): reproducible env pins with lockfile-verified dependency closures.
# NARROWS (never widens) two documented docs/SANDBOX.md caveats — the shared-.venv reach and venv drift.
# A micro-app may be PINNED to a CONTENT-ADDRESSED closure materialized at state/envstore/<hash>/,
# described by apps/<name>/env.lock (the per-file hashes the closure is the content address of).
enabled = true         # VERIFY + SBPL-narrow half, SHIPS ON (armed-by-default). At SPAWN a pinned app's on-disk closure is re-hashed and compared to env.lock FAIL-CLOSED (any changed/missing/extra file or tampered lock REFUSES to spawn — never a silent fall-back to the shared .venv), and the sandbox is narrowed to grant exec/read of ONLY the pinned closure instead of the whole shared .venv (strictly narrower, read-only, app-specific). An app with NO env.lock is unaffected (legacy shared-.venv). This half is READ + VERIFY + NARROW only — zero network. Set false to skip verify/narrow.
fetch_enabled = false  # The ONE network step: MATERIALIZING a closure (darwind --env-build <app>, envlock::env_build). SHIPS OFF. Even ON it is ADDITIONALLY user-originated — the SAME egress gate as open_url/web_search, so an injected or autonomous build is REFUSED — and a human-run CLI step; it downloads each locked artifact, verifies its sha256 against env.lock FAIL-CLOSED, and re-verifies the whole closure before promoting it. Authoring a lock stays a human step, exactly like forge's scripts/apply_forge.sh. The sandboxed app itself still gets ZERO network regardless.

[optimize]
# Optimization-from-usage loop (optimize.rs): DARWIN records a local, PII-redacted
# trace of each interaction + its outcome (did the user correct/redirect on the
# next turn, or complete cleanly?), and a later Optimizer phase PROPOSES a measured
# tuning (start with routing/selection — agent-pick + mode + cue weights) that is
# adopted ONLY IF it beats the current baseline on HELD-OUT traces. The SAME
# propose-only contract as [self_heal]/[forge] (now armed by default). This is a bounded,
# measured, reversible loop — not self-improving AGI. The LIVE recording is
# runtime-gated (traces accrue only while the daemon runs with this ON); tests use
# mock traces.
enabled = true    # master gate, SHIPS ON (full-power default). Live trace recording is runtime-gated (traces accrue only while the daemon runs with this on); traces are PII-REDACTED before storage (emails / phone numbers / >=6-digit runs / URLs with embedded credentials / api-key- and token-shaped strings are stripped) and NEVER contain a secret or token; retention is bounded (oldest rows evicted past the cap). The optimizer still only PROPOSES diffs a human applies (mode below stays "propose"). Set false to disable.
mode = "propose"  # "propose" (default): the downstream Optimizer reuses the self-heal posture — it writes a measured config/prompt/example diff for a HUMAN to review+apply and NEVER silently mutates a live config or behavior; an optimization is adopted ONLY IF it MEASURABLY beats the current baseline on held-out traces, and every adoption is reversible. "auto" is reserved and behaves as "propose" for now — there is no auto-apply-to-live path. Unknown values behave as "propose".

[changeq]
# Change Queue (changeq.rs): ONE git-native review lane unifying every propose-only
# artifact DARWIN produces (self-heal patches, code diffs, forged micro-apps,
# routing-optimization proposals). PURE bookkeeping over stores that are ALREADY
# propose-only: when a writer produces a proposal the queue ALSO registers it and, on
# a git repo, commits that artifact onto a dedicated LOCAL branch (darwin/changeq) with
# secret-free provenance trailers (Darwin-Agent / Darwin-Model / Darwin-Run /
# Darwin-State-Hash) via bounded, fixed-arg git subprocesses that NEVER touch your
# working tree or HEAD (git plumbing over a separate index). The read-only changeq_list
# tool lists every pending proposal with its diff/artifact locator + provenance;
# changeq_apply resolves a chosen proposal to THAT type's EXISTING gated apply script
# (scripts/apply_heal.sh / apply_code_diff.sh / apply_forge.sh / apply_optimization.sh)
# + re-validation — it invents NO new apply authority — and rollback is a safe git revert.
enabled = true       # master gate, SHIPS ON (full-power default) — INERT WITHOUT A REPO: with no git repo the branch commit is a no-op (the in-memory queue + the read-only list still work); it never fabricates a branch it could not create. It changes NOTHING about any writer's propose-only contract — apply still runs each type's mandatory re-validation + human confirmation. Set false to register nothing.
max_pending = 64     # BOUND on the in-memory review window (clamped to [1, 512]); past it the OLDEST pending proposal is evicted so the lane can never grow without bound.

[registry]
# ATTESTED REGISTRY + SBOM (registry.rs): verify plugin bytes ON YOUR OWN MACHINE
# instead of trusting the publisher. A plugin is ADMITTED to DARWIN's signed LOCAL
# index only when BOTH gates clear: (a) a re-derived build in the STAGING sandbox
# produces an artifact hash + a dependency-closure (SBOM) hash that MATCH the plugin's
# attestation (the reproducible-build check), AND (b) an allowlisted ed25519 signature
# over the attestation verifies (reuses `ring`, the vetted crate already in the tree).
# FAIL-CLOSED: any hash mismatch, a non-allowlisted signer, or an invalid/tampered
# signature REFUSES admission. This is a VERIFICATION GATE and adds NO new install
# authority — install stays the human-gated step (apps.rs / scripts/apply_forge.sh); the
# registry only decides ELIGIBILITY. "Trust the publisher" becomes "verify the bytes on
# my own machine".
verify = true                 # VERIFY master switch. ARMED BY DEFAULT (read-only verification gate, like [introspect]/[audit]) — but INERT WITHOUT A TRUSTED SIGNER: the [registry.signers] allowlist ships EMPTY, so with no allowlisted ed25519 key NO attestation can verify and admission is FAIL-CLOSED (nothing is admitted) until the owner adds a trusted key. Set false to disable.
require_rebuild_match = true  # also require a LOCAL staging rebuild whose artifact + dependency-closure (SBOM) hash MATCH the attestation before admission (the reproducible-build check). SHIPS ON; fail-closed (no rebuild / any mismatch => no admission).
# [registry.signers]          # allowlisted ed25519 signers: <key-id> = "<hex-encoded 32-byte public key>". EMPTY by default (the gate is inert until the owner adds a trusted key). A malformed entry is ignored (never trusted). Example:
# owner-key-1 = "3b6a27bcceb6a42d62a3a8d02a6f0d73653215771de243a63ac048a18b59da29"

[explain]
# CAUSA (explain.rs): the causal decision-trace explainer — "why did you do that" /
# "why <Agent>". At the end of each turn the loop folds the branch signals it ALREADY
# computed (intent + confidence, selector mode, the agent it routed to, the local-vs-
# cloud route, the per-turn owner gate, the capability it used, and the outcome) into
# an ordered, REDACTED DecisionTrace held in a SMALL BOUNDED ring (the last `ring_size`
# turns). Asking "why did you do that" narrates that trace in persona and emits the
# secret-free `causa.trace` telemetry. READ-ONLY: it changes NOTHING about routing, it
# reconstructs ONLY from records the daemon already holds, and it NEVER fabricates a
# rationale — an unrecorded turn returns an honest empty ("I don't have a trace for that").
enabled = true      # master gate, SHIPS ON (full-power default). The utterance + outcome in a trace are PII-REDACTED at assembly (emails / phones / >=6-digit runs / credentialed URLs / api-key- and token-shaped strings stripped) and the ring is bounded (oldest evicted). Off => no trace is recorded and "why did you do that" falls through to the model. Set false to disable.
ring_size = 16      # how many recent turns the decision-trace ring retains. Clamped to a sane band (1..=128); an out-of-range value never disables recording nor grows the ring unbounded.

[calibrate]
# PLUMBLINE (calibrate.rs): DARWIN's honest confidence-calibration self-report. It
# folds the recent (classifier-confidence, outcome) window into a RELIABILITY CURVE
# (per confidence bucket: how often DARWIN was actually right) + a single scalar
# over/under-confidence GAP (ECE-style), applying a MIN_SAMPLE floor so a thin bucket
# is reported "insufficient data", never judged. READ-ONLY aggregate analytics: a
# sample is a float + an outcome (NO utterance, no PII), emitted as the secret-free
# `calibrate.report` telemetry. It changes NOTHING on its own.
enabled = true               # master gate for the report pass, SHIPS ON (full-power default) — the same always-on, no-autonomy posture as the eval scorecard. Off => no report is emitted. Set false to disable.
influence_routing = false    # gates the REDUCE-ONLY clarify-band hook. SHIPS OFF so the first landing is pure analytics and routing is byte-for-byte today's. When ON, the router MAY RAISE its clarify/low-confidence threshold in a bucket PLUMBLINE measured as overconfident — asking MORE clarifying questions there. The hook is mathematically incapable of LOWERING the threshold: it can only ever make DARWIN more cautious, never bolder.
n_bins = 10                  # reliability resolution (deciles). Fine enough to see a miscalibration bend, coarse enough that a bucket can reach the floor on a real corpus.
min_sample = 20              # per-bucket honesty floor: below this many GRADED turns a bucket is "insufficient data" and is EXCLUDED from the ECE / gap (never judged on noise).
overconfidence_margin = 0.1  # dead-band: a bucket counts as "overconfident" (and eligible for the reduce-only widen) only if actual success lags the claimed confidence by MORE than this, so ordinary sampling noise never widens the clarify band.
max_widen = 0.15             # cap on the reduce-only hook's widen: it never raises the clarify threshold by more than this, and the result is always capped at 1.0.

[mirror]
# MIRROR (user_model.rs): belief-audit + contest over the SELF-MODEL. "why do you
# think I prefer X" surfaces the STORED observation, provenance, and observed-count
# of that belief — never a fabricated reason. "that's wrong about X" DROPS the belief
# AND writes a `user.model.suppressed.*` tombstone that the reflection/consolidation
# pass CONSULTS, so a contested belief is NEVER silently re-derived (the tombstone is
# user-clearable). Emits the secret-free `mirror.belief` telemetry frame for the HUD.
# READ-ONLY / REDUCE-ONLY: contesting only ever REMOVES a shared `user.model.*` belief
# and suppresses it — it is structurally unable to touch a private `agent.*` note, and
# does nothing consequential.
enabled = true      # master gate, SHIPS ON (full-power default). Off => "why do you think…" / "that's wrong…" fall through to the model. Set false to disable.

[standing]
# Standing Missions (standing.rs): durable, scheduled, autonomous goals that run
# on the standing-missions scheduler tick (a dedicated runtime loop, separate from
# EDITH's anticipation tick) and reason over the shared World Model — the
# self-heal/forge gated-autonomy pattern applied to "a recurring goal".
enabled = true    # subsystem MASTER switch, SHIPS ON (full-power default). Even on: ESTABLISHING a standing mission is itself a cross-turn confirmation-gated action (standing_create is in CONSEQUENTIAL_TOOLS; DARWIN never silently spawns recurring autonomy), and every CONSEQUENTIAL step a running mission proposes (post/send/spend/control) STILL parks behind the confirmation gate + the [integrations] master switch — a standing mission can never auto-send/post/spend. Bounded: at most 8 active missions; each run is bounded by FURY's per-mission caps. Set false to disable.
# TRIPWIRE (condition triggers): a standing mission may fire when a threshold on the verified signal snapshot is crossed ("free disk below 10%", "unread above 5", "calendar event within 15m") instead of on a clock. A tripwire may only READ + REASON — it holds no actuator, is INERT when this subsystem is off, and every consequential step the fired mission proposes STILL parks behind the confirm gate. Arming one routes through the SAME gated standing_create path. These two knobs tune the reactive path:
condition_eval_secs = 60        # evaluation cadence: min seconds between condition-trigger evaluations against a fresh snapshot on the standing tick (the tick bounds the real max frequency).
condition_debounce_secs = 3600  # anti-flap re-fire floor: min seconds between successive FIRES of the same tripwire after it clears. Combined with the built-in Schmitt hysteresis dead-band; clamped up to a 5-minute floor.

[drafts]
# AUTO-DRAFT (#25, drafts.rs): compose a REVIEWABLE pending draft (an email reply /
# message / doc) the user reads and then sends THEMSELVES through the existing gated
# send. The draft module has NO send path — a draft is ALWAYS a suggestion.
enabled = true    # SHIPS ON (full-power default). A draft is ALWAYS a reviewable suggestion — the drafts module has NO send path; an actual send is a SEPARATE explicit action that rides the existing gate ([integrations].allow_consequential && a fresh confirm) exactly like a normal send. Enabling never enables an autonomous send. Set false to disable proactive drafting.
retention = 200   # evict-oldest cap on persisted pending drafts (bounded store)

[missions]
# DURABLE MISSIONS (#26, durable_missions.rs): persist FURY mission state (a mission
# record + per-sub-task status) so a campaign survives a restart and can be resumed /
# listed / cancelled.
durable = true    # SHIPS ON (full-power default). KEY SAFETY preserved: a persisted mission does NOT auto-run on restart — it loads PAUSED and the user must explicitly resume it; a resumed mission re-runs each CONSEQUENTIAL step through the SAME gate (the persistence carries NO pre-approval); it inherits FURY's <=6 sub-task / 1-deep bounds. Enabling only adds persistence, never autonomy. Set false for in-memory-only missions.
retention = 50   # evict-oldest cap on persisted missions (bounded store)

[macros]
# MACRO RECORD/REPLAY (#27, macros.rs): record a NAMED sequence of commands (the
# utterances / classifier intent names ONLY — NEVER secrets, tokens, or resolved
# credentials) and replay it.
enabled = true    # SHIPS ON (full-power default). KEY SAFETY preserved: replay re-runs EACH recorded command through the NORMAL router path + the gate EACH time — a consequential step in a macro hits the confirmation gate + the master switch FRESH, exactly as if spoken live (NO pre-approval, NO batching past the gate). The store holds only the utterance + intent name; a secret can never be persisted. Enabling only allows record/replay. Set false to disable.
max_steps = 12   # max commands one macro may hold (a bounded sequence)
retention = 100   # evict-oldest cap on stored macros (bounded store)

[runbook]
# RUNBOOKS (runbook.rs): a benign-only, TYPED, INSPECTABLE automation DAG (a step up
# from opaque macros). Each step names a capability it `uses` (a tool/skill/agent), a
# typed `with` input map, the step ids it `needs`, and an optional `out` that can feed a
# later step's `with`.
enabled = false   # SHIPS OFF. KEY SAFETY: the parser/typechecker/planner are PURE (they only inspect); `run` walks the DAG topologically and re-issues EACH step through the NORMAL router + the gate FRESH, one at a time — a consequential step PARKS for a spoken confirm + master switch + voice-id + lockdown FRESH, exactly as if issued live (NO pre-approval, NO batching). Data flow (`out` -> a later `with`) passes a VALUE only, never authority: a parked step produces nothing, so its consumer BLOCKS rather than run on a fabricated value. Set true to enable planning/running.
max_steps = 32   # max steps one runbook may hold (a bounded DAG)

[telemetry]
port = 7177   # WebSocket server hosted by darwind on 127.0.0.1

[apps]
# Micro-app runtime substrate (docs/SANDBOX.md). autostart lists micro-app
# names darwind launches under their seatbelt profiles at startup. Ships EMPTY
# — nothing is autostarted; apps start on voice ("open global scan") or by
# adding their name here. Names with no matching manifest are skipped with a
# startup telemetry warning. Example: autostart = ["global-scan"]
autostart = []

[introspect]
# Micro-app introspection sentinel (introspect.rs, docs/INTROSPECT.md). A slow,
# READ-ONLY watch over darwind's OWN sandboxed children: SBPL profile-drift
# (fingerprint the profile we wrote vs. what's on disk) + per-app RSS/CPU
# anomaly surfacing via a libproc PROC_PIDTASKINFO struct read — never argv/env
# (same-UID children, no entitlement, no EndpointSecurity/ptrace/task_for_pid).
# It emits introspect.snapshot /
# introspect.profile_drift / introspect.anomaly for the HUD + posture and takes
# NO action — reacting to a finding would be consequential and rides the normal
# confirm + voice-id + policy + lockdown gates. SHIPS ON; inert until an app
# runs. With it false the sentinel loop is not spawned.
enabled = true
# Sentinel cadence + anomaly sensitivity (defaults shown; absent = these values).
interval_secs      = 60     # seconds between ticks (profile-drift + resource sample + caps)
startup_delay_secs = 30     # wait after boot before the first tick (let apps settle)
cpu_alert_percent  = 95.0   # sustained CPU% above which an app is flagged
rss_growth_ratio   = 3.0    # RSS growth multiple over baseline that counts as a runaway

[persistence]
# Persistence Sentinel — "Autoruns for the Mac" (persistence.rs). A slow,
# READ-ONLY inventory of the host's autostart / persistence surfaces, each read
# via a FIXED-ARG bounded subprocess (never a shell string), so the parsers are
# CI-tested on canned output:
#   * ~/Library/LaunchAgents, /Library/LaunchAgents, /Library/LaunchDaemons
#     plist listings (Label / Program / RunAtLoad / ProgramArguments)
#   * user-domain `launchctl list` (third-party jobs; com.apple.* filtered)
#   * `crontab -l`
#   * login items via System Events (Automation-TCC gated -> honest SKIP without
#     the grant, NEVER a fabricated empty list)
#   * loaded third-party kexts (`kmutil showloaded`; com.apple.* filtered)
#   * Gatekeeper status (`spctl --status`)
#   * per-autostart-binary signing/notarization (`codesign -dv`, `spctl --assess`
#     — ASSESSMENT reads only, never executions)
# It keeps a baseline and reports DELTAS (a NEW / REMOVED / newly-UNSIGNED
# autostart item) via the `security.persistence` telemetry frame + a summary in
# the posture readout. DARWIN's own two launch items (com.darwin.daemon /
# com.darwin.inference) are LABELED as self and are NEVER alarmed on. STRICTLY
# READ-ONLY: no writes to user data, no kills, no unloads, no remediation.
# SHIPS ON (full-power default); with it false the sentinel loop is not spawned.
enabled = true
# Sentinel cadence (defaults shown; absent = these values).
interval_secs      = 300    # seconds between scans (the autostart surface moves slowly)
startup_delay_secs = 45     # wait after boot before the first scan
# Signing assessment (codesign/spctl per backing binary — ASSESSMENT reads only).
assess_signing     = true   # run the per-binary signing/notarization reads
max_assess         = 64     # cap on binaries assessed per scan (bounds the work)

[exposure]
# Inbound Exposure Auditor — a defensive "nmap-of-self" (exposure.rs). A slow,
# READ-ONLY audit of THIS machine's OWN listening sockets, read via a FIXED-ARG
# bounded `netstat -anv` (never a shell string), so the parser is CI-tested on
# canned output. It SENDS NO PACKETS and never touches another host — it only
# reads the local socket table. Each listener is classified loopback-only
# (127.0.0.0/8 / ::1) vs LAN/all-interfaces EXPOSED, and each exposed well-known
# port is mapped to its macOS sharing service (22 -> Remote Login, 5900 ->
# Screen Sharing, 445/139 -> File Sharing, 7000 -> AirPlay, ...) via a static
# table. Honest about the read's limit: a service is identified by well-known
# port, not by correlating the owning process, and an exposed port with no table
# entry is reported as unrecognized (never hidden, never guessed). It emits the
# `security.exposure` telemetry frame + folds a summary into the posture readout.
# STRICTLY READ-ONLY: it closes nothing. The only remediation is the gated
# `open_settings_pane` actuator, which deep-links to the relevant Settings pane
# so the USER flips the switch — it stays behind the standard per-action confirm
# gate (it is in CONSEQUENTIAL_TOOLS; it always parks, never auto-opens).
# SHIPS ON (full-power default); with it false the auditor loop is not spawned.
enabled = true
# Auditor cadence (defaults shown; absent = these values).
interval_secs      = 300    # seconds between scans (the listening surface moves slowly)
startup_delay_secs = 40     # wait after boot before the first scan

[interception]
# Traffic-Interception Integrity Check — "is anything MITMing me?" (interception.rs).
# A slow, READ-ONLY read of THIS machine's OWN local config, each surface read via
# a FIXED-ARG bounded subprocess (never a shell string), so the parsers are
# CI-tested on canned output. It SENDS NO PACKETS and never touches another host:
#   * `scutil --proxy`  — an unexpected system/PAC HTTP(S)/SOCKS proxy
#   * `/etc/hosts`      — non-default entries that redirect a domain to a routable
#                         IP (loud) or pin one to loopback (a block); the default
#                         localhost/broadcasthost lines are expected, never flagged
#   * non-Apple trusted ROOT CAs — `security dump-trust-settings -d` (the ADMIN
#                         trust-settings domain — honest SKIP without privileges) +
#                         the System-keychain certs (`security find-certificate -a`);
#                         a rogue trusted root silently breaks ALL your TLS, so it is
#                         surfaced LOUDLY
#   * `scutil --dns`    — the configured resolvers (a LOOPBACK resolver means
#                         something on-box is handling every lookup)
#   * `profiles show`   — installed configuration/MDM profiles (user-domain
#                         readable; system-domain -> honest SKIP)
# Each finding is explained in PLAIN SPEECH; it emits the `security.interception`
# telemetry frame + folds a summary into the posture readout. STRICTLY READ-ONLY:
# no writes, no config changes, no remediation (not even a gated one) — removing a
# proxy or a root CA is the user's own action in System Settings / Keychain Access.
# Honest SKIP when a read needs a privilege the no-sudo daemon lacks — NEVER a
# fabricated "clean". SHIPS ON (full-power default); with it false the check loop
# is not spawned.
enabled = true
# Check cadence (defaults shown; absent = these values).
interval_secs      = 300    # seconds between checks (local interception config moves slowly)
startup_delay_secs = 50     # wait after boot before the first check

[integrations]
# Shared substrate for the Chart-2 integrations (GitHub, Slack, Google
# Drive/Calendar). allow_consequential is THE master gate for outward/
# side-effecting actions (post a message, create an event). SHIPS ON (true,
# full-power default) — the headline of the full-power posture. INERT-SAFE:
# flipping it ON does NOT bypass anything — every consequential action STILL
# requires a fresh per-action confirm + voice-id (if enrolled) + !lockdown + the
# per-action policy at the runtime chokepoints. With it true a CONFIRMED
# consequential action runs for real instead of returning a DryRun preview; with
# it false a consequential action returns a DRY-RUN PREVIEW and performs no side
# effect even when confirmed (read-only lookups always work either way). Set
# false to disarm (back to dry-run-only).
allow_consequential = true

[mcp]
# Model Context Protocol client (mcp.rs) — connect to external MCP tool servers
# (local subprocesses speaking JSON-RPC over stdio, or remote HTTP endpoints) and
# offer their tools to DARWIN agents. This is the MOST DANGEROUS external surface
# in DARWIN: an MCP server runs code on YOUR machine and exposes tools an agent
# can call. Treat it like [self_heal].enabled — turn on deliberately.
#
# enabled SHIPS ON (true, full-power default) — INERT WITHOUT SERVERS: the
# servers list ships EMPTY and the installer must NOT add any, so even enabled
# NOTHING connects until you add at least one [[mcp.servers]] entry below — no
# server connects, no tool is discovered, no tool can be called until then.
#
# DEFENSE IN DEPTH (always on, independent of these switches):
#   * Every CONSEQUENTIAL MCP tool parks behind the cross-turn confirmation gate +
#     the [integrations].allow_consequential master switch (now ON, but a confirmed
#     action still needs a fresh confirm + voice-id + !lockdown) — an MCP tool can
#     never auto-send/post/spend/mutate without a spoken yes.
#   * Unknown/mutating tools default to CONSEQUENTIAL (fail-safe); a tool is only
#     ungated if its server's config asserts it read-only.
#   * A per-server `agents` allowlist controls WHICH agents may use it (default:
#     only the orchestrator + the listed agents — never all 27).
#   * stdio servers run under a default-deny seatbelt (sandbox-exec) profile that
#     grants only the filesystem/network the server's config declares.
#   * A server's optional token resolves from the Keychain (mcp_<name>_token) and
#     is NEVER in this file, in logs, in Debug, on argv, or in a URL.
enabled = true             # SHIPS ON (full-power default); INERT WITHOUT SERVERS (add a [[mcp.servers]] entry to connect). Set false to fully disable the MCP client.
max_servers = 8            # cap on concurrently-connected servers
max_tools_per_server = 64  # cap on tools accepted from any one server
call_timeout_ms = 30000    # per-call wall-clock ceiling; a slow/hung server is abandoned here
max_output_bytes = 262144  # reject any single server response larger than this (256 KiB)

# Servers ship EMPTY. Example (commented out): a filesystem MCP server, sandboxed
# to one project dir, no network, tools all consequential by default except the
# read-only ones it lists, usable only by the orchestrator + the "friday" agent.
#
# [[mcp.servers]]
# name = "files"                       # [a-z0-9_-]+; also the mcp_files_token account + sandbox profile stem
# transport = "stdio"                  # "stdio" (local subprocess) | "http" (remote skeleton)
# command = "/usr/bin/some-mcp-server" # absolute interpreter/binary to spawn
# args = ["--root", "/Users/you/proj"]
# uses_token = false                   # true -> resolve mcp_files_token from the Keychain (never inline)
# agents = ["friday"]                  # which agents may use it (orchestrator always allowed)
# default_class = "consequential"      # default classification for this server's tools (fail-safe)
# read_only_tools = ["list", "read"]   # tools this config asserts are safe to call ungated
# fs_read = ["/Users/you/proj"]        # extra read subpaths granted in the seatbelt profile
# fs_write = []                        # extra write subpaths granted
# net_hosts = []                       # outbound TCP host-names allowed; [] = NO network

[skills]
# The SKILL LIBRARY (daemon/src/skills/): DARWIN's hand-written, in-tree set of
# small, PURE, deterministic capabilities (encoders, counters, converters,
# deterministic helpers), discovered via the `skill_list` meta-tool and run via
# `skill_invoke`. It is a genuine in-tree library + an open standard you can
# extend (add a SkillDef in-tree, or — at the extension point — an external
# manifest; see docs/SKILLS.md). It is NOT a populated community marketplace, and
# the catalog reports the REAL shipped count.
#
# enabled SHIPS ON (true) — like the rest of the full-power default —
# because every shipped skill is pure + read-only and safe to offer by default.
# Setting it false only HIDES the meta-tools; it loosens nothing. A CONSEQUENTIAL
# skill (one that mutates/acts outside the process) is ALWAYS parked behind the
# cross-turn confirmation gate + the [integrations]
# allow_consequential master switch when invoked — this flag never lets a
# side-effecting skill fire unconfirmed.
enabled = true

[voice_id]
# ON-DEVICE SPEAKER VERIFICATION (daemon/src/voiceid.rs): a LIGHTWEIGHT ACOUSTIC
# owner model — pre-emphasis -> Hann frames -> a mel-spaced log filterbank (a
# small self-contained real-DFT per band, NO model download, NO new dependency)
# -> per-band temporal mean+std (cepstral-mean-normalized) -> an L2-normalized
# feature vector, compared by cosine to a LOCALLY-enrolled owner profile.
#
# HONESTY: this RAISES THE BAR (an obviously different voice is rejected) but is
# NOT a high-assurance biometric — it is SPOOFABLE by a replayed recording or a
# good impersonation, and its accuracy is threshold- and voice-dependent and
# DEVICE-gated (never a measured FAR/FRR). The hard security backstop for outward
# actions remains the [integrations] allow_consequential master
# switch + the cross-turn spoken confirmation gate; voice-id is an ADDED layer on
# top of them, never a replacement. Raw audio is NEVER persisted: the owner
# profile (state/voiceid/owner.json, 0600) is a local feature VECTOR only.
enabled = false              # master switch, SHIPS OFF deliberately (voice-id is a fail-closed GATE, not a full-power feature — enrollment is ALWAYS explicit): when false, OR with no enrolled profile, NOTHING is gated by voice — behavior is unchanged. Enrollment is ALWAYS explicit ("enroll my voice"), never automatic; "forget my voice" clears the profile. When enabled+enrolled: an UNRECOGNIZED speaker may not trigger a consequential/outward action and may not confirm (replay) a parked action a bystander could otherwise approve. FAIL-CLOSED for consequential: an embed error / no usable audio while enforcing is treated as UNVERIFIED (deny the consequential path) but never bricks ordinary replies. (Enrolling it ADDS a layer on top of the now-armed master switch + per-action confirm + lockdown.)
threshold = 0.86             # cosine ACCEPT on the acoustic embedding (max over enrolled centroids). The operating point — voice/device-dependent, tune on the real mic. Higher = stricter (fewer false accepts, more false rejects). NOT a measured accuracy.
min_enroll_samples = 3       # how many owner utterances the explicit "enroll my voice" flow captures before the local profile is saved.
gate_scope = "consequential" # "consequential" (default): gate only outward/consequential actions + the confirmation replay. "all": ALSO block non-consequential commands from an unrecognized speaker (a stricter posture). Unknown values fall back to "consequential" (never silently to "all").

[threshold]
# VOICE-SCOPED GUEST MODE (daemon/src/threshold.rs): when voice-id reports an
# UNRECOGNIZED speaker (or the owner toggles guest mode on), DARWIN applies a
# restrict-only GUEST scope for the turn — a strictly READ-ONLY tool allowlist (no
# consequential/outward tools, no writes), recall confined to the SHARED tier
# (never the owner's private agent.* facts — it REUSES voiceid/memory's existing
# namespace-isolation guard via a reserved sentinel namespace), and a quieter focus
# profile. A guest scope is DERIVED from the owner scope and is provably NO BROADER
# than it on every axis: it can only ever REMOVE tools, confine recall, and quiet.
#
# HONESTY: voice-id is a bar-RAISER, not a high-assurance biometric (it is
# replay-/impersonation-spoofable). Guest mode is therefore a COURTESY boundary
# LAYERED ON TOP of — NEVER a replacement for — the real backstops: the
# [integrations] allow_consequential master switch, the per-action spoken confirm
# gate, the voice-id owner gate, and the per-action [policy] layer. Those are
# UNCHANGED whether or not guest mode is on; a guest turn is gated AT LEAST as
# strictly as an owner turn, never more loosely.
enabled = true               # master switch, SHIPS ON (armed by default): an unrecognized speaker is auto-scoped to guest. ARMED-but-INERT — the "unrecognized" signal only exists when [voice_id] is ENFORCING (enabled + a profile enrolled), so with voice-id off (the shipped default) this scopes NOTHING until the owner enrolls a voice OR explicitly toggles guest mode. false => guest scope never applies (owner behavior byte-for-byte).
guest_profile = "deep_focus" # the (quiet) focus profile a guest turn uses. Ships "deep_focus" (only a genuinely CRITICAL signal surfaces — a stranger doesn't get the owner's proactive intel). Parsed via focus::FocusProfile::from_config_str, which is restrict-only for ANY string, so even a typo can only ever quiet, never broaden. Other sensible values: "sleep", "work", or any custom name.

[episodic]
# The EPISODIC STORE (daemon/src/episodic.rs): DARWIN's durable, redacted,
# agent-scoped, BOUNDED memory of completed interactions, plus the recall over it
# (temporal recent/since/around + topical BM25, combined; the Mnemosyne
# `episodic_recall` read-only tool). An EPISODE is one completed turn reduced to a
# redacted record: { ts, agent_namespace, utterance_redacted, topic,
# salient_entities, outcome, summary }.
#
# enabled SHIPS ON (true) — UNLIKE self_heal/forge/optimize/voice_id, which ship
# OFF — because this is the SAME always-on, bounded, LOCAL posture as the
# transcripts table and the lifelong-learning fact loop: a per-completed-turn
# record that powers READ-ONLY recall, not any autonomous behavior. The honesty
# that earns the on-default: recording is GATED at the source exactly like the
# transcript/learning loop (a screen-read TRANSIENT turn and a voice-id-UNVERIFIED
# turn are NEVER recorded; nor is an empty/abandoned turn), every field is REDACTED
# before store (the same redactor that strips emails/phones/secrets from traces),
# recall is AGENT-SCOPED (an episode stays in its agent's scope + the shared
# orchestrator tier, never another specialist's), and it is INSPECTABLE +
# FORGETTABLE (an agent's episodes can be cleared). It is NOT "remembers
# everything": retention is bounded (evict-oldest below). Turn it OFF to record no
# episodes at all — recall then honestly returns nothing, it never fabricates one.
enabled = true
# Evict-oldest cap on the on-disk episode store — the bounded-memory contract. The
# store keeps the RECENT past, not "everything forever"; past this cap the OLDEST
# episodes are dropped by the same retention pass that caps transcripts. Generous
# enough for a meaningful history, small enough that the store stays tiny on the
# always-on appliance.
retention = 5000

[voice]
# OPTIONAL ElevenLabs cloud VOICE TIER (daemon/src/voice_tier.rs). An ADDED
# premium-TTS layer on top of the on-device Kokoro default ([speech].voice) — it
# is NEVER a replacement. SHIPS ON (full-power default) but INERT WITHOUT a key —
# add an elevenlabs_api_key (Keychain); without it, on-device Kokoro is used.
#
# HONESTY: when this tier is ON, the text DARWIN is about to speak LEAVES the
# device — a cloud round trip to api.elevenlabs.io to synthesize the audio. The
# on-device Kokoro engine stays the PRIVATE/OFFLINE default and the FALLBACK on any
# ElevenLabs error/timeout, so a turn is never failed by the cloud leg. Live voice
# quality is DEVICE + CREDENTIAL gated (a real key + network on the real machine)
# and is NOT claimed measured here. VOICE-ONLY: this is a TTS voice layer; DARWIN
# owns its own brain/router/turn-taking (it does NOT use a hosted agents platform).
#
# The ElevenLabs path is reached ONLY when ALL of these hold:
#   1. cloud_tier = true (this switch), AND
#   2. an `elevenlabs_api_key` is present in the Keychain (paste it in Settings),
#      AND
#   3. the active runtime model-swap tier is NOT Local — i.e. you have not said
#      "work offline" / "go offline" / "stay on device". Offline intent keeps
#      voice on-device too.
# Otherwise (this off, OR no key, OR offline) TTS is EXACTLY today's on-device
# Kokoro. The key rides ONLY the xi-api-key request header — never the URL, argv,
# logs, Debug, or telemetry.
cloud_tier = true              # TTS master switch, SHIPS ON (full-power default) — INERT WITHOUT A KEY: reached only when true AND elevenlabs_api_key is in the Keychain AND the tier is non-Local; otherwise on-device Kokoro (the private default + fallback). When active the TTS TEXT leaves the device. Set false to force on-device Kokoro.
# cloud_stt — the SEPARATE master switch for the ElevenLabs Scribe cloud-STT tier
# (transcription). SHIPS ON (full-power default), gated INDEPENDENTLY of cloud_tier:
# STT sends the user's VOICE AUDIO to the cloud, which is MORE sensitive than the
# TTS text leg. With it false (OR no `elevenlabs_api_key`, OR offline/Local tier)
# transcription is EXACTLY today's on-device mlx_whisper — which is also the
# FALLBACK on ANY Scribe error/offline, so a turn is never failed by the cloud leg.
# On-device whisper is the private/offline default. Same precedence as cloud_tier:
# Scribe runs ONLY when cloud_stt = true AND a key is present AND the tier is non-Local.
cloud_stt = true               # STT master switch, SHIPS ON (full-power default) — INERT WITHOUT A KEY, gated SEPARATELY from cloud_tier on purpose (STT sends VOICE AUDIO, more sensitive than TTS text): needs the EL key + a non-Local tier; otherwise on-device mlx_whisper (the private default + fallback). When active the VOICE AUDIO leaves the device. Set false to force on-device whisper.
model = "eleven_flash_v2_5"    # ElevenLabs model id used when the tier is active. eleven_flash_v2_5 (~75ms, real-time, cheapest); eleven_multilingual_v2 (stable); eleven_v3 (most expressive). Read by the inference server.
adaptive_prosody = true        # #33 ADAPTIVE TONE/PROSODY, SHIPS ON (full-power default). Expressiveness-only: picks a ProsodyProfile and emits EL-v3 audio-tags ONLY on EL-v3 backends; on Kokoro the mapping is coarse/neutral (rich prosody is EL-v3-gated, stated honestly). Changes delivery, never a gate. Set false for neutral delivery.
whisper = true                 # #34 WHISPER / DISCREET MODE, SHIPS ON (full-power default). Explicit-command terse + soft delivery. Changes DELIVERY ONLY — never suppresses a required safety confirmation (a required confirm still speaks, softly). Set false to disable.
whisper_auto = true            # #34 auto-engage whisper by sustained low-amplitude input, SHIPS ON (full-power default). PURE energy-series heuristic; does NOT open the mic itself. Delivery-only. Set false to require the explicit command.
diarize = true                 # #31 MULTI-SPEAKER DIARIZATION, SHIPS ON (full-power default) — INERT ON-DEVICE: consumes speaker labels the EL SCRIBE STT backend reports; on-device whisper has no diarization model => honest single-stream "speaker: unknown" (never fabricated speakers). EL-Scribe-gated. Set false for single-stream always.
# cloud_sfx — the SOUND-EFFECT CUE tier (the inference server's sound_effect op:
# a short text prompt -> a generated SFX cue). SHIPS ON (full-power default), gated
# EXACTLY like cloud_tier: reached only when cloud_sfx = true AND an
# `elevenlabs_api_key` is present in the Keychain AND the tier is non-Local. There is
# NO on-device SFX generator, so without a key (or offline) it is a SILENT NO-OP — no
# cue is produced, stated honestly, never faked. An ADDED cue layer reached only
# through its explicit gate/command; it NEVER changes the default speech path. When
# active the SFX TEXT PROMPT leaves the device (text only). Set false to disable cues.
cloud_sfx = true               # SFX cue master switch, SHIPS ON (full-power default) — INERT WITHOUT A KEY: needs the EL key + a non-Local tier; otherwise a silent no-op (no on-device SFX generator). Reached only through its explicit gate; never changes the default speech path. When active the SFX text prompt leaves the device. Set false to disable cues.
# cloud_music — the MUSIC GENERATION tier (the inference server's compose_music op:
# a short text prompt -> a generated FULL-LENGTH music track). SHIPS ON (full-power
# default), gated EXACTLY like cloud_sfx: reached only when cloud_music = true AND an
# `elevenlabs_api_key` is present in the Keychain AND the tier is non-Local. There is
# NO on-device music generator, so without a key (or offline) it is honestly
# UNAVAILABLE — no track is produced, stated honestly, never faked. An ADDED generation
# layer reached only through its explicit gate/command; it NEVER changes the default
# speech path. When active the music TEXT PROMPT leaves the device (text only). Set
# false to disable music generation.
cloud_music = true             # music-generation master switch, SHIPS ON (full-power default) — INERT WITHOUT A KEY: needs the EL key + a non-Local tier; otherwise honestly unavailable (no on-device music generator). Reached only through its explicit gate; never changes the default speech path. When active the music text prompt leaves the device and it generates a full track. Set false to disable music generation.
# stream_tts — LOW-LATENCY STREAMING TTS. OPT-IN (ships OFF) so DEFAULT BEHAVIOR IS
# UNCHANGED — today's blocking synthesis stays the default. When true AND the resolved
# backend is ElevenLabs, `speak` requests the streaming endpoint for faster first
# audio; the inference server FALLS BACK to blocking on ANY streaming error, so a turn
# is never failed by the streaming leg. Inert on Kokoro (the on-device path is
# unchanged). Delivery timing only — never a gate/policy surface.
stream_tts = false             # low-latency streaming TTS, OPT-IN (ships OFF) — default is today's blocking synthesis. When true AND the backend is ElevenLabs, speak streams for first-audio latency (falls back to blocking on any streaming error). Inert on Kokoro. Set true to opt in.
# event_cues — EVENT CUES. OPT-IN (ships OFF) so DEFAULT BEHAVIOR IS UNCHANGED. When
# true, a short ElevenLabs SFX cue is played as FIRE-AND-FORGET cosmetic feedback on a
# couple of key system events (a `confirm` plays the "success" cue, a `deny` plays the
# "notify" cue). The cue is spawned detached AFTER the action has already completed, so
# it NEVER blocks, delays, or changes the outcome/reply of the confirm/deny, and a cue
# error is swallowed. It rides the SAME gate as cloud_sfx (needs cloud_sfx = true + an
# elevenlabs_api_key in the Keychain + a non-Local tier); without that it is a silent
# no-op. Set true to opt in.
event_cues = false             # play a fire-and-forget SFX cue on key system events (confirm -> "success", deny -> "notify"), OPT-IN (ships OFF). Requires cloud_sfx + an EL key; silent no-op otherwise. Never affects the action's outcome or timing. Set true to opt in.
# pronunciation_dictionary_id / pronunciation_dictionary_version — the ACTIVE
# ElevenLabs pronunciation-dictionary locator threaded into `speak`. Both DEFAULT ""
# (none): empty id = NO locator is sent, so speech is byte-for-byte today's. The
# create_pronunciation op (name + rules, text/rules only — no audio leaves the device)
# returns the dictionary_id + version_id to paste here. With an id set, the server
# adds it to the speak request's pronunciation_locators; the version is OPTIONAL
# (empty = latest version). EL-pronunciation-gated; inert on Kokoro.
pronunciation_dictionary_id = ""      # ACTIVE EL pronunciation-dictionary id threaded as a speak locator. DEFAULT "" (none) => no locator, today's speech. Paste the dictionary_id the create_pronunciation op returns.
pronunciation_dictionary_version = "" # OPTIONAL version for the locator above. DEFAULT "" (none) => latest version. Paste the version_id the create_pronunciation op returns to pin it. Inert when the id is empty.
# mic_source — MICROPHONE SOURCE. DEFAULT "device" (today's behavior, byte-for-byte):
# the daemon opens the local input device with cpal and captures it. Set "app" to route
# microphone audio IN over a confined Unix socket (state/ipc/audio_in.sock, 0700 dir /
# 0600 socket) from the HUD app instead of the daemon opening the mic itself. In "app"
# mode the daemon reads a token-authenticated handshake (the SAME per-boot command token,
# verified with apps::verify_command_token), then ingests length-prefixed f32 frames into
# the SAME capture pipeline (VAD / barge / lockdown / meter all identical — only the
# SOURCE of frames changes). An invalid token closes the connection with no audio. Any
# value other than "app" is treated as "device" (the safe default).
mic_source = "device"          # "device" (default; today's cpal capture) | "app" (route the mic in over state/ipc/audio_in.sock from the HUD, token-authenticated handshake + length-prefixed f32 frames). Any other value => "device".

# [docsearch] — ON-DEVICE FILE RAG (docsearch.rs): index + search the user's OWN
# text-like files, 100% on-device. File CONTENTS + EMBEDDINGS NEVER LEAVE THE
# DEVICE — embedding is the on-device MLX embed op, and search falls back to
# lexical BM25 (reporting which actually ran) when that server is down; nothing is
# uploaded. SHIPS ON (full-power default) but INERT WITHOUT ROOTS, with the EXTRA
# guard that the folder allowlist (`roots`) ships EMPTY, so it is never a whole-disk
# scan: even with `enabled` true it indexes nothing until you allowlist a folder:
# even flipping `enabled` true indexes nothing until you allowlist a folder. Every
# candidate file is PATH-CONFINED (canonicalized + must live under an allowlisted
# root; symlink-escape / `..` / absolute-elsewhere are REJECTED), the index is
# BOUNDED (max files/chunks/bytes), and it is FORGETTABLE (clear it). Indexes
# TEXT-LIKE files PLUS born-digital PDFs (memory-jailed extraction) and Office
# OOXML documents (.docx/.xlsx/.pptx), all extracted on-device; a scanned /
# encrypted / corrupt file is honestly SKIPPED, never indexed as garbage. Other
# binaries (images, archives, legacy .doc/.xls/.ppt) remain out of scope.
[docsearch]
enabled = true                 # master switch, SHIPS ON (full-power default) — INERT WITHOUT ROOTS: even enabled it indexes NOTHING until you allowlist a folder below. Set false to fully disable indexing.
roots = []                     # EXPLICIT folder allowlist, SHIPS EMPTY (the installer must NOT guess). Add absolute paths to the folders you want searchable; nothing else is ever read. Contents + embeddings never leave the device.
max_files = 5000               # bound: max files indexed across all roots.
max_chunks = 50000             # bound: max chunks stored.
max_file_bytes = 2097152       # bound: per-file size cap (2 MiB); larger files are skipped.
max_depth = 16                 # bound: recursion depth under each root (root = depth 0).
chunk_chars = 1200             # chunk window size in chars.
chunk_overlap = 200            # overlap between consecutive chunks (must be < chunk_chars).
build_graph = true             # KNOWLEDGE-GRAPH build over already-indexed chunks, SHIPS ON (full-power default) — INERT WITHOUT INDEXED DOCS: the deterministic extractor only reads chunks the confined allowlisted indexer produced (never re-walks disk) and writes the shared user.world.* tier (provenance-tagged, deduped, bounded). Inert until docsearch has roots + an index. Set false to disable.
spotlight = true               # macOS SPOTLIGHT BRIDGE (spotlight.rs), SHIPS ON (full-power default) — READ-ONLY (mdfind/mdls only; nothing can mutate Spotlight state) and INERT WITHOUT ROOTS: every mdfind query is confined with -onlyin to the roots above (never an unrestricted whole-Mac query), and every candidate re-runs the SAME path-confinement/allowlist/size/extraction pipeline before it may be indexed. Cited hits gain mdls metadata (content type / last used / authors) when readable — absent when not, never fabricated. Set false to disable.
spotlight_max_candidates = 64  # bound: max Spotlight candidate paths considered per search (clamped to a hard ceiling in code).

# [code] — CODE INTELLIGENCE (code.rs): code_explain (a grounded, CITED answer over
# the on-device code index — never fabricating code not indexed) + code_propose_diff
# (a PROPOSE-ONLY reviewable unified diff written to state/code/proposals/<ts>/ — it
# NEVER edits your code). SHIPS ON (full-power default) but INERT WITHOUT ROOTS:
# because it READS and PROPOSES EDITS to your code, it does NOTHING until you
# allowlist a
# `roots` codebase root. The ONLY path that touches your code is the human-reviewed
# scripts/apply_code_diff.sh, which is CONFINED BY CONSTRUCTION (sandbox-exec
# deny-default-write) to the canonicalized allowlisted root — it re-validates the
# diff and writes ONLY under that root, never out-of-tree. The model's diff QUALITY
# (does it compile/work) is runtime/model-gated and is NOT claimed measured.
[code]
enabled = true                 # master switch, SHIPS ON (full-power default) — INERT WITHOUT ROOTS: code_explain answers only from the on-device index and the apply script writes ONLY under an allowlisted root, so it reaches nothing until `roots` is set. code_propose_diff drafting also needs the cloud key. Set false to fully disable.
roots = []                     # EXPLICIT codebase-root allowlist, SHIPS EMPTY (the installer must NOT guess). Add the absolute path to your project; the apply script writes ONLY under a root here (never an arbitrary path). NOTE: this `roots` is the ENABLE + APPLY-CONFINEMENT gate; retrieval for code_explain/code_propose_diff is over the on-device file index, so also allowlist the same root under [docsearch].roots (and reindex) so your code is actually retrievable.
max_diff_bytes = 262144        # bound: a proposed diff larger than this (256 KiB) is refused before it is stored.

# [answers] — ANSWER ANNOTATIONS (anthropic.rs `answers` module): always-cite
# source-tracking (#5) + self-reported confidence (#8). These SHIP ON (full-power
# default) and are honesty-gated.
#   - cite: when true, an answer is followed by a "Sources:" line naming the REAL
#     tool-result sources that fed it (the citation-carrying reads), or "from my
#     own knowledge" when no retrieval ran (NEVER a fabricated citation). Off =>
#     the response is byte-for-byte today's.
#   - confidence: when true, the model is asked to self-report grounded/inferred/
#     uncertain + a one-line why; the daemon parses + surfaces it. The PLUMBING is
#     what ships tested; the calibration QUALITY is runtime/model-behavior-gated
#     and is never claimed measured. Off => no instruction, the prompt is unchanged.
#   - verify (#7): the self-verification pass. When true, an IMPORTANT turn gets ONE
#     extra self-critique of the DRAFT against the real sources + AT MOST one bounded
#     revise. Gated (skips trivial turns) AND bounded. REDUCES hallucination; NOT a
#     correctness guarantee. Off => byte-for-byte today's, NO critique call.
#   - cross_check (#21): tool-result verification. When true, a BOUNDED plausibility
#     cross-check runs over a TOOL RESULT before it is surfaced as fact / built into
#     a consequential action: deterministic sanity checks (empty-vs-claimed, uncited
#     fact, self-contradiction, out-of-range) ALWAYS run when on. A tripped check
#     only DOWNGRADES confidence + FLAGS the result with an honest caveat — it NEVER
#     removes or relaxes a confirmation gate (that gate lives in [integrations] +
#     confirm.rs, untouched). Off => no checks, the response is unchanged.
#   - cross_check_model_pass (#21): the OPTIONAL single bounded "does this result
#     look right for this query?" model call, gated UNDER cross_check (a cost). When
#     false (the default) only the deterministic layer runs; no extra model call.
#   - debate (#22): multi-model debate. When true, a HIGH-STAKES ask only (a
#     conservative should_debate predicate — ordinary turns never debate) gets a
#     SECOND independent model on the same question: agreement RAISES confidence;
#     disagreement SURFACES BOTH answers + the disagreement (never silently picked or
#     averaged into a fake consensus); an unavailable second brain falls back to one
#     and SAYS SO. Bounded to <=2 model calls. Off => one model, unchanged.
[answers]
cite = true                    # SHIPS ON (full-power default, #5). Surfaces the real tool-result sources (or "from my own knowledge") — never a fabricated citation. Set false to disable.
confidence = true              # SHIPS ON (full-power default, #8). The model self-reports grounded/inferred/uncertain + a one-line why; calibration quality is model-behavior-gated (not measured). Set false to disable.
verify = true                  # SHIPS ON (full-power default, #7). One bounded self-critique of the draft on IMPORTANT turns + at most one revise (skips trivial turns; needs the cloud tier for the cloud path). Reduces hallucination; not a correctness guarantee; costs one extra model call. Set false to disable.
cross_check = true             # SHIPS ON (full-power default, #21). Bounded deterministic plausibility cross-check of a tool result before it is surfaced/built into an action — downgrades confidence + flags a caveat only, NEVER removes a confirmation gate. Set false to disable.
cross_check_model_pass = true  # SHIPS ON (full-power default, #21). The optional single model "does this look right?" pass under cross_check (a latency/cost add; needs the cloud tier for the cloud path; the deterministic layer runs regardless). Set false to drop the model pass.
debate = true                  # SHIPS ON (full-power default, #22). High-stakes-only two-model debate (conservative predicate; ordinary turns never debate); agreement raises confidence, disagreement surfaces BOTH (never a fake consensus); bounded to <=2 model calls; needs the cloud tier. Inert on ordinary turns. Set false to disable.

# [audit] — APPEND-ONLY, HASH-CHAINED, TAMPER-EVIDENT audit log (audit.rs) of every
# CONSEQUENTIAL decision (proposed / parked / blocked-by-policy / auto-approved /
# confirmed / denied / executed). UNLIKE the autonomy switches, this one SHIPS ON:
# the log is READ-ONLY ACCOUNTABILITY — it never takes an action, it only records the
# decisions the consequential gate already makes, SECRET-FREE (the target is redacted;
# a token/PII never lands in the log) and BOUNDED (prune-oldest + chain re-root past
# max_entries). HONESTY: it is tamper-EVIDENT (the hash chain detects mutate / insert /
# delete / reorder via verify_chain), NOT tamper-PROOF (a root attacker who can rewrite
# the whole on-disk chain forward would still verify — it is an integrity tripwire, not
# a vault). With enabled=false NO entry is written and the chokepoints behave
# byte-for-byte as today.
[audit]
enabled = true                 # SHIPS ON (read-only accountability loosens nothing). false = skip all audit records.
max_entries = 10000            # retention cap: past this the oldest are pruned and the surviving suffix re-rooted.

# [triage] — FORENSIC TRIAGE SNAPSHOT (triage.rs, agent "aegis"). A one-shot READ-ONLY
# "capture everything" that FREEZES a REDACTED, timestamped evidence bundle under
# state/forensics/<ts>/ — the process tree + per-binary signing (codesign -dv, an
# ASSESSMENT read that never executes), the socket table, the machine/TCC/persistence
# baselines + current state, a BOUNDED `log show` excerpt of the security subsystems
# (sandboxd/tccd/syspolicyd/socketfilterfw), and recent quarantine (LSQuarantine) events —
# so the owner can hand a professional real evidence. Every value is REDACTED AT SOURCE
# (secrets / PII / credentialed URLs / the home path). HONESTY: unified-log <private>
# fields stay redacted by macOS without admin; the bundle says so, never de-anonymizes them.
# STRICTLY READ-ONLY re: the machine — no kills, no config/security changes, and RESTORE is
# NEVER automated (triage only captures). NOTHING is transmitted; it writes ONLY under
# state/forensics/. The bundle's manifest SHA-256 is folded into the audit chain and the
# resulting chain HEAD is written to the macOS Keychain as an EXTERNAL ANCHOR. These knobs
# only BOUND the capture; they never grant a capability.
[triage]
max_bundle_bytes = 8388608     # whole-bundle byte budget (8 MiB): sections truncate/drop with an honest note past this.
log_window_minutes = 60        # how far back the bounded security-subsystem `log show` excerpt reaches.

# [policy] — PER-ACTION POLICY store (policy.rs): the controlled, USER-SET loosening/
# hardening that sits BENEATH the [integrations].allow_consequential master switch and
# ABOVE the cross-turn confirmation gate. Precedence NEVER > ALWAYS > ASK.
#   - NEVER  hard-blocks an action even with the master switch ON + a fresh confirmation.
#   - ALWAYS auto-approves (skips the per-turn park) ONLY when the master switch is ON
#            AND the voice-id gate allows; master OFF => still a DryRun preview. A policy
#            can NEVER grant an action the master switch forbids.
#   - ASK    (the default) parks for a spoken human "yes" — the existing behavior.
# It SHIPS EMPTY: with no rules every action evaluates to Ask, so the gate behaves
# EXACTLY as today (ASK/park everywhere). USER-SET ONLY: rules are set via Settings / the
# authenticated-local command channel and live in the user-owned state/policy.json —
# there is NO tool/agent/model path that can write a policy, and the rules are
# deliberately NOT a key here, so the model can't reach them via a config edit either.
# `enabled` is the layer master switch (ON, but inert while the store is empty); false
# bypasses the layer entirely (every action is Ask).
[policy]
enabled = true                 # layer master switch, SHIPS ON but INERT (store ships empty => Ask everywhere). false = bypass the layer.

# [security] — AT-REST ENCRYPTION of the sensitive local stores (crypto.rs). Transparent,
# whole-file SQLCipher AES-256 over the four sensitive SQLite DBs (the main memory Db:
# facts/transcripts/episodes/events + the world-model facts tier; the docsearch index;
# the audit log; the optimizer trace store) PLUS the voiceid owner profile (wrapped in its
# own encrypted blob). SHIPS OFF by deliberate choice (NOT part of the full-power
# default) — because enabling CHANGES THE ON-DISK FORMAT (an irreversible migration).
#   - false (the default): every store opens PLAINTEXT (byte-for-byte today's SQLite). No
#     key is generated or read; nothing migrates.
#   - true: on first enable a fresh 256-bit master key is generated, written to the macOS
#     Keychain (account memory_encryption_key), and the existing plaintext stores are
#     re-keyed to SQLCipher (read-plaintext -> write-encrypted migration). Every later
#     open uses the key from the Keychain.
# HONESTY (read before enabling): SQLCipher protects AT REST ON DISK ONLY. While the daemon
# runs, the key + the decrypted pages are in RAM — NOT protected from a live-process/root
# attacker. NOT covered: this config TOML, the Keychain item itself (already OS-protected),
# and the in-RAM working set. And: the key lives ONLY in the Keychain — lose that item and
# the encrypted DBs are UNRECOVERABLE.
[security]
encrypt_memory = false         # SHIPS OFF (enabling changes the on-disk format + migrates). true = encrypt the sensitive stores at rest.

# [enclave] — ENCLAVE CUSTODY (enclave.rs): ADDITIVE, hardware-bound custody of the at-rest
# DB master key OVER the existing macOS Keychain path. WHERE an Apple Secure Enclave + the SE
# entitlement (a code-signed host) are present, the master key is wrapped by a NON-EXPORTABLE,
# hardware-bound Secure-Enclave key (kSecAttrTokenIDSecureEnclave) — the wrapping key never
# leaves the chip and cannot be exfiltrated even by root. Where absent (the shipped, unentitled
# posture), custody FALLS BACK to the unchanged OS-protected Keychain path.
#   - enabled = true (the default): ARMED, but INERT until the SE hardware + entitlement are
#     present — reported honestly (a self-check SKIP + an enclave.status frame with active=false),
#     NEVER a fabricated "enclave-protected" claim.
#   - enabled = false: custody is exactly today's Keychain path.
# HONESTY: this is custody-hardening ONLY. It never changes which key at-rest encryption resolves
# ([security].encrypt_memory), and it never touches per-agent credential isolation. With
# encryption OFF there is no master key to bind, so enclave is a no-op regardless of this switch.
[enclave]
enabled = true                 # ARMED by default; inert (honest Keychain fallback) without a Secure Enclave + SE entitlement.

# [fleet] — OVERWATCH: server-less, E2E-encrypted fleet POLICY across your OWN Macs (fleet.rs).
# A SIGNED, owner-authored policy BASELINE authored on one Mac is enforced on every device as a
# FLOOR OF STRICTNESS folded into policy::evaluate_global. It can force a tool STRICTER (Never, or
# always-Ask / a feature ceiling), and it can ONLY harden:
#   - it can NEVER loosen a device below its own decision (a stricter LOCAL rule still wins),
#   - it can NEVER grant what a device's master switch forbids (a fleet rule can't even express
#     "always" — the type forbids it; the [integrations] master switch is a separate downstream AND),
#   - a tool the baseline doesn't name is untouched.
# It rides the SAME sealed-bundle + shared-Keychain-key path as [sync] (account sync_shared_key,
# paired only between your own devices) — the AES-256-GCM seal IS the signature, so a baseline that
# opens was authored by you on one of your Macs. NO-MODEL-WRITE: the daemon only OPENS + INSTALLS a
# pre-sealed baseline (state/fleet/baseline.sealed); it never authors one from a model.
# SHIPS OFF (like [sync]/[distill]): with it off nothing is loaded, the floor is empty, and
# policy::evaluate_global is byte-for-byte today. INERT without the shared key + a sealed baseline.
[fleet]
enabled = false                # SHIPS OFF. true = load + enforce the owner-authored signed baseline as a floor of strictness (hardens only; never loosens, never grants). Set true after you've sealed a baseline onto this device.

[aperture]                     # APERTURE (aperture.rs) — a PRIVATE, owner-gated, ON-DEVICE activity timeline ("Recall done right"). Records which app was frontmost + its window TITLE (PII-redacted) + duration into a bounded, TRANSIENT in-RAM ring, recallable by voice ("what was I working on around 3pm"). Records app + title + time ONLY — never screen pixels; NOTHING leaves the box.
enabled = false                # SHIPS OFF (an activity timeline is privacy-sensitive; with it off nothing is polled or stored). Set true to opt in.
retention = 500                # evict-oldest cap on the in-RAM timeline ring (bounded memory; floored >= 1).
poll_interval_secs = 5         # seconds between frontmost-app/window samples (floored >= 1).

[handoff]                      # CONTINUITY HANDOFF (handoff.rs) — resume a LIVE cognitive session on ANOTHER of your Macs. A session capsule (transcript window, active agent, mission ref, world-model deltas, draft ids, focus profile) is sealed over the SAME [sync] AES-256-GCM path under a Keychain-paired handoff_shared_key; the receiver restores context and PARKS. AUTHORITY NEVER TRANSFERS: the capsule carries NO credential/bearer (redacted), and every consequential step re-hits the fresh confirm + voice-id + master switch + lockdown on the receiving device.
enabled = false                # SHIPS OFF (rides [sync], also OFF). Set true (with sync paired) to seal/resume session capsules between your own devices.

# DARWIN LANGUAGE SERVER (daemon/src/dls.rs) — a READ-ONLY, LOOPBACK-ONLY LSP-style
# endpoint for a human editing DARWIN's config/manifests, grounded in the LIVE
# capability graph (never a static schema): it COMPLETES config keys from the daemon's
# own KNOWN_KEYS registry, HOVERS a config section against the live capability atlas
# (capability.rs/atlas.rs), and DIAGNOSES with the daemon's REAL rules — an
# over-privileged/malformed manifest (plugin_sdk::validate_manifest), a `net` scope
# without net_hosts, an unknown agent tool (the agents.rs allowlist), a `mode = "auto"`
# autonomy lint, and an unknown config key/section (KNOWN_KEYS). It NEVER writes config
# and takes NO action (the intentional absence of a config-write primitive is preserved);
# it only assists the human who edits. Point a thin editor shim at 127.0.0.1:<port> and
# send one JSON request per line ({"id":N,"method":"completion|hover|diagnostics","params":{…}}).
[dls]
enabled = false                # SHIPS OFF (opt-in). A read-only loopback socket is low-risk, but a listening socket is still a surface, so it stays off until you point an editor at it. true = serve the LSP-style endpoint on the loopback port below.
port = 7346                    # loopback (127.0.0.1) bind for the editor shim. Distinct from telemetry (7177) and webhooks (8723). Inert until enabled.

[voice.voices]
# Per-agent ElevenLabs voice ids: agent name -> EL voice id. An UNMAPPED agent
# falls back to that agent's on-device Kokoro voice. DARWIN ships mapped to the
# ElevenLabs PREMADE "George" (a stable, shared British male voice available to
# ANY account) so the cloud voice tier engages with JUST an ElevenLabs key in the
# Keychain — no manual voice-id step. Change this id to any voice from your EL
# account's Voices page, and add lines for other agents the same way, e.g.:
#   friday = "21m00Tcm4TlvDq8ikWAM"
darwin = "JBFqnCBsd6RMkjVDRZzb"
