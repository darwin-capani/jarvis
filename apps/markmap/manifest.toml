[app]
name        = "markmap"
version     = "0.1.0"
description = "Read-only Markdown outline extractor: pull the ATX heading structure (a table of contents) from Markdown. Pure, offline."
entry       = "apps/markmap/main.py"
runtime     = "python"

[permissions]
audio     = false
gpu       = false
net_hosts = []
fs_read   = ["apps/markmap", "apps/_sdk"]
fs_write  = ["state/apps/markmap"]

[ui]
surface          = "panel"
telemetry_topics = ["markmap.status"]

[intents]
provides = ["markmap.outline"]

[[tools.exposes]]
name          = "markmap.outline"
scopes        = ["fs_read"]
consequential = false
description   = "Extract the ATX heading outline (a table of contents) from a Markdown document: returns each heading's level and text plus a total count; call it to see the structure of Markdown text."

[[tools.exposes.params]]
name        = "markdown"
kind        = "string"
required    = false
description  = "The Markdown document text to scan for ATX headings; when omitted or empty an empty outline is returned."
