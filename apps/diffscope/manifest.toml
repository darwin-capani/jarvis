[app]
name        = "diffscope"
version     = "0.1.0"
description = "Read-only text diff: a unified line-diff between two texts with added/removed counts. Pure, offline."
entry       = "apps/diffscope/main.py"
runtime     = "python"

[permissions]
audio     = false
gpu       = false
net_hosts = []
fs_read   = ["apps/diffscope"]
fs_write  = ["state/apps/diffscope"]

[ui]
surface          = "panel"
telemetry_topics = ["diffscope.status"]

[intents]
provides = ["diffscope.unified"]

[[tools.exposes]]
name          = "diffscope.unified"
scopes        = ["fs_read"]
consequential = false
