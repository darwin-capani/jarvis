[app]
name        = "diffscope"
version     = "0.1.0"
description = "Read-only text diff: a unified line-diff between two texts with added/removed counts. Pure, offline."
entry       = "apps/diffscope/main.py"
runtime     = "python"

[permissions]
audio     = false
gpu       = false
net_hosts = []
fs_read   = ["apps/diffscope", "apps/_sdk"]
fs_write  = ["state/apps/diffscope"]

[ui]
surface          = "panel"
telemetry_topics = ["diffscope.status"]

[intents]
provides = ["diffscope.unified"]

[[tools.exposes]]
name          = "diffscope.unified"
scopes        = ["fs_read"]
consequential = false
description   = "Compute a read-only unified line-diff between two texts 'a' and 'b', returning the diff text (capped at 200 lines) plus added/removed line counts. Call it to compare two versions of a snippet or file."
[[tools.exposes.params]]
name        = "a"
kind        = "string"
required    = false
description  = "The original / left-hand text (missing or null is treated as empty)."
[[tools.exposes.params]]
name        = "b"
kind        = "string"
required    = false
description  = "The updated / right-hand text (missing or null is treated as empty)."
