[app]
name        = "rewrite"
version     = "0.1.0"
description = "On-device AI rewriter: rewrite text in a requested tone/style using the local LLM. Offline."
entry       = "apps/rewrite/main.py"
runtime     = "python"

[permissions]
audio     = false
gpu       = false
net_hosts = []
fs_read   = ["state/ipc/apps/generate.sock", "apps/rewrite"]
fs_write  = ["state/apps/rewrite"]

[ui]
surface          = "panel"
telemetry_topics = ["rewrite.status"]

[intents]
provides = ["rewrite.run"]

# THE AGENT-TOOL CONTRACT: a non-consequential declaration here is OFFERED TO
# THE AGENT LOOP as an invocable app__<tool> def ([apps].agent_tools, ships ON),
# so every declared tool MUST be served by handle() with the request-id echo
# (see main.py reply_result) — a declared-but-unserved tool would be offered to
# the model and time out. `description` becomes the model-facing tool description
# verbatim; each [[tools.exposes.params]] renders into the def's input_schema
# (name/kind/required/description; kind is a JSON-Schema primitive; `type`/`op`/
# `id`/`token` are reserved by the wire envelope and rejected at validation).
[[tools.exposes]]
name          = "rewrite.run"
scopes        = ["generate"]
consequential = false
description   = "Rewrite a piece of text in a requested tone or style using the on-device LLM, preserving the original meaning, facts, and intent. Call when the user wants text reworded, rephrased, or restyled (e.g. more formal, friendlier, more concise)."

[[tools.exposes.params]]
name        = "text"
kind        = "string"
required    = true
description = "The text to rewrite (required, non-empty)."

[[tools.exposes.params]]
name        = "tone"
kind        = "string"
required    = false
description = "Optional tone or style for the rewrite, e.g. 'formal', 'friendly', 'concise'. Defaults to 'clear and professional' when omitted or blank."
