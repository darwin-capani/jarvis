[app]
name        = "unitwise"
version     = "0.1.0"
description = "Dimensional-analysis unit converter across 9 categories plus affine temperature. Pure, offline."
entry       = "apps/unitwise/main.py"
runtime     = "python"

[permissions]
audio     = false
gpu       = false
net_hosts = []
fs_read   = ["apps/unitwise"]
fs_write  = ["state/apps/unitwise"]

[ui]
surface          = "panel"
telemetry_topics = ["unitwise.status"]

[intents]
provides = ["unit.convert"]

[[tools.exposes]]
name          = "unit.convert"
scopes        = ["fs_read"]
consequential = false
