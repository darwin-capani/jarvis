[app]
name        = "entropy"
version     = "0.1.0"
description = "Read-only secret-strength estimator: character-set size, length, Shannon entropy bits, and a strength class for a candidate password/secret. Pure, offline; returns only stats, never the input."
entry       = "apps/entropy/main.py"
runtime     = "python"

[permissions]
audio     = false
gpu       = false
net_hosts = []
fs_read   = ["apps/entropy"]
fs_write  = ["state/apps/entropy"]

[ui]
surface          = "panel"
telemetry_topics = ["entropy.status"]

[intents]
provides = ["entropy.assess"]

[[tools.exposes]]
name          = "entropy.assess"
scopes        = ["fs_read"]
consequential = false
description   = "Estimate the strength of a candidate password/secret: returns its length, character-set size, Shannon entropy in bits, and a strength class (very weak..very strong). Call when the user asks how strong or guessable a password is. Read-only; returns only aggregate stats, never the input text."

[[tools.exposes.params]]
name        = "text"
kind        = "string"
required    = false
description  = "The candidate password/secret to assess. Only its character classes and length are read; the text is never echoed back."
