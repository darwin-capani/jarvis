[app]
name        = "numbase"
version     = "0.1.0"
description = "Read-only number-base converter: parse an integer given in a source base and render it in binary, octal, decimal, and hexadecimal. Pure, offline."
entry       = "apps/numbase/main.py"
runtime     = "python"

[permissions]
audio     = false
gpu       = false
net_hosts = []
fs_read   = ["apps/numbase", "apps/_sdk"]
fs_write  = ["state/apps/numbase"]

[ui]
surface          = "panel"
telemetry_topics = ["numbase.status"]

[intents]
provides = ["numbase.convert"]

[[tools.exposes]]
name          = "numbase.convert"
scopes        = ["fs_read"]
consequential = false
description   = "Parse an integer written in a given source base (2-36) and render it in binary, octal, decimal, and hexadecimal. Call to convert a number between bases or to see its bin/oct/dec/hex forms."

[[tools.exposes.params]]
name        = "value"
kind        = "string"
required    = true
description  = "The integer to convert, as digits valid in from_base with an optional leading sign (e.g. \"FF\", \"-42\", \"1010\")."

[[tools.exposes.params]]
name        = "from_base"
kind        = "integer"
required    = false
description  = "Base the value is written in, 2-36; defaults to 10."
