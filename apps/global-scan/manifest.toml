# Global-Scan — intel feed aggregator (first micro-app on the substrate).
# Schema: docs/SANDBOX.md. Aggregates & summarizes PUBLIC, non-paywalled RSS
# feeds and renders them in the HUD; no prediction, no surveillance.
#
# fetch_hosts lists EXACTLY the feed hostnames apps/global-scan/feeds.toml polls
# (every URL there was verified to return a parseable RSS/Atom feed). The app has
# NO direct network: net_hosts is EMPTY, so darwind's seatbelt profile is a flat
# (deny network*). Feeds are fetched THROUGH the daemon-mediated fetch proxy
# (state/ipc/apps/fetch.sock) — the daemon resolves, SSRF/rebind-guards, follows
# redirects within the allow-list, and returns the body — collapsing the two
# INHERENT SBPL network caveats (coarse host filtering + DNS exfil, docs/
# SANDBOX.md → the Phase-4 fetch proxy). LLM summaries still ride the separate
# generate proxy socket; neither reaches the raw inference.sock (finding #4).

[app]
name        = "global-scan"
version     = "0.1.0"
description = "Intel feed aggregator: polls reputable public RSS/Atom feeds, dedupes and ranks the latest items, optionally adds a neutral local-LLM summary, and renders the result as a HUD panel."
entry       = "apps/global-scan/main.py"
runtime     = "python"

[permissions]
audio     = false
gpu       = false
# NO direct network — the app fetches feeds through the daemon-mediated fetch
# proxy (fetch_hosts below), so its SBPL profile is a flat (deny network*).
net_hosts = []
# Exactly the feed hostnames in feeds.toml — keep the two lists in lockstep.
# The fetch proxy authorizes each URL against this list (https-only, exact host).
fetch_hosts = [
  "feeds.npr.org",          # NPR — world/national news
  "feeds.bbci.co.uk",       # BBC — world news
  "feeds.arstechnica.com",  # Ars Technica — technology
  "hnrss.org",              # Hacker News front page — technology
  "www.theverge.com",       # The Verge — technology
  "www.sciencedaily.com",   # ScienceDaily — science
  "www.nasa.gov",           # NASA — science
  "feeds.a.dj.com",            # WSJ public markets headlines — markets
  "feeds.content.dowjones.io", # MarketWatch top stories (post-redirect host) — markets
]
fs_read   = [
  "state/ipc/apps/fetch.sock",    # daemon-mediated fetch proxy (feed bodies; NO direct net)
  "state/ipc/apps/generate.sock", # op-restricted generate proxy (NOT raw inference.sock)
  "apps/_sdk",                     # shared READ-ONLY dyld module-report stub (docs/INTROSPECT.md)
]
fs_write  = ["state/apps/global-scan"]       # cache / scratch (its own app dir)

[ui]
surface          = "panel"
telemetry_topics = ["feed"]
