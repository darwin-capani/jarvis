[app]
name        = "csvlens"
version     = "0.1.0"
description = "Read-only CSV profiler: row/column counts, headers, and per-column non-empty/empty tallies. Pure, offline (csv + io stdlib)."
entry       = "apps/csvlens/main.py"
runtime     = "python"

[permissions]
audio     = false
gpu       = false
net_hosts = []
fs_read   = ["apps/csvlens"]
fs_write  = ["state/apps/csvlens"]

[ui]
surface          = "panel"
telemetry_topics = ["csvlens.status"]

[intents]
provides = ["csvlens.profile"]

[[tools.exposes]]
name          = "csvlens.profile"
scopes        = ["fs_read"]
consequential = false
description   = "Profile CSV text: return row and column counts, header names, and per-column non-empty/empty cell tallies. Call to inspect, summarize, or validate the shape of raw CSV content."

[[tools.exposes.params]]
name        = "csv"
kind        = "string"
required    = true
description  = "The raw CSV document text to profile; must be a non-empty string."

[[tools.exposes.params]]
name        = "delimiter"
kind        = "string"
required    = false
description  = "Single-character field delimiter (defaults to a comma)."
