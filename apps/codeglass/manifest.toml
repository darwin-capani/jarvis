[app]
name        = "codeglass"
version     = "0.1.0"
description = "Read-only code-metrics panel: line/blank/comment/code counts, longest line, and TODO/FIXME density for a pasted snippet. Pure, offline, no consequential surface."
entry       = "apps/codeglass/main.py"
runtime     = "python"

[permissions]
audio     = false
gpu       = false
net_hosts = []
fs_read   = ["apps/codeglass", "apps/_sdk"]
fs_write  = ["state/apps/codeglass"]

[ui]
surface          = "panel"
telemetry_topics = ["codeglass.status"]

[intents]
provides = ["codeglass.metrics"]

[[tools.exposes]]
name          = "codeglass.metrics"
scopes        = ["fs_read"]
consequential = false
description   = "Compute read-only line-metrics for a pasted code snippet: total/blank/comment/code line counts, longest-line length, and TODO/FIXME/XXX marker count. Call when the user wants a quick size/comment/work-item breakdown of a snippet."

[[tools.exposes.params]]
name        = "code"
kind        = "string"
required    = false
description  = "The source-code snippet to measure; each embedded newline separates a line. Missing or non-string is treated as an empty snippet (all-zero metrics)."
