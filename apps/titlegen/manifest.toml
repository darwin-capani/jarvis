[app]
name        = "titlegen"
version     = "0.1.0"
description = "On-device AI title generator: write a concise, compelling title/headline for text using the local LLM."
entry       = "apps/titlegen/main.py"
runtime     = "python"

[permissions]
audio     = false
gpu       = false
net_hosts = []
fs_read   = ["state/ipc/apps/generate.sock", "apps/titlegen"]
fs_write  = ["state/apps/titlegen"]

[ui]
surface          = "panel"
telemetry_topics = ["titlegen.status"]

[intents]
provides = ["titlegen.run"]

# THE AGENT-TOOL CONTRACT: a non-consequential declaration here is OFFERED TO
# THE AGENT LOOP as an invocable app__<tool> def ([apps].agent_tools, ships ON),
# so every declared tool MUST be served by handle() with the request-id echo
# (see main.py reply_result) — a declared-but-unserved tool would be offered to
# the model and time out. Declaration-only entries are no longer inert docs.
# `description` becomes the model-facing tool description verbatim; each
# [[tools.exposes.params]] renders into the def's input_schema (name/kind/
# required/description; kind is a JSON-Schema primitive; `type`/`op`/`id`/
# `token` are reserved by the wire envelope and rejected at validation).
[[tools.exposes]]
name          = "titlegen.run"
scopes        = ["generate"]
consequential = false
description   = "Write one concise, compelling title/headline (under 12 words) for a block of text using the on-device LLM. Call when the user wants a headline, title, or subject line generated for some text."

[[tools.exposes.params]]
name        = "text"
kind        = "string"
required    = true
description  = "The source text to headline. Must be a non-empty string; the tool returns an error without it."
