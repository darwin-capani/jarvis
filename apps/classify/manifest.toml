[app]
name        = "classify"
version     = "0.1.0"
description = "On-device AI text classifier: assign text to exactly one of the caller-provided labels using the local LLM."
entry       = "apps/classify/main.py"
runtime     = "python"

[permissions]
audio     = false
gpu       = false
net_hosts = []
fs_read   = ["state/ipc/apps/generate.sock", "apps/classify"]
fs_write  = ["state/apps/classify"]

[ui]
surface          = "panel"
telemetry_topics = ["classify.status"]

[intents]
provides = ["classify.run"]

[[tools.exposes]]
name          = "classify.run"
scopes        = ["generate"]
consequential = false
description   = "Classify a piece of text into exactly ONE of the caller-provided labels using the on-device LLM; call when you need to bucket free-form text into a fixed label set and want just the chosen label back."

[[tools.exposes.params]]
name        = "text"
kind        = "string"
required    = true
description  = "The text to classify. Must be a non-empty string."

[[tools.exposes.params]]
name        = "labels"
kind        = "array"
required    = true
description  = "The candidate labels to choose from — a non-empty list of non-empty strings. The model picks exactly one of these."
