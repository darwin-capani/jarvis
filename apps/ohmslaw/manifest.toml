[app]
name        = "ohmslaw"
version     = "0.1.0"
description = "Ohm's law + power solver: give any two of voltage/current/resistance/power (as numbers or SI-unit strings) and get the other two. Pure, offline."
entry       = "apps/ohmslaw/main.py"
runtime     = "python"

[permissions]
audio     = false
gpu       = false
net_hosts = []
fs_read   = ["apps/ohmslaw"]
fs_write  = ["state/apps/ohmslaw"]

[ui]
surface          = "panel"
telemetry_topics = ["ohmslaw.status"]

[intents]
provides = ["ohm.solve"]

[[tools.exposes]]
name          = "ohm.solve"
scopes        = ["fs_read"]
consequential = false
description   = "Solve an Ohm's-law + power circuit: supply EXACTLY two of voltage/current/resistance/power (each a number in base SI units, or an SI-unit string like '12V', '10mA', '2.2kohm', '0.25W') and get all four values plus the formulas used. Call to compute the missing electrical quantities of a resistive circuit."
[[tools.exposes.params]]
name        = "voltage"
kind        = "number"
required    = false
description  = "Voltage across the element, in volts (or an SI string like '12V', '5kV'). Provide exactly two of voltage/current/resistance/power."
[[tools.exposes.params]]
name        = "current"
kind        = "number"
required    = false
description  = "Current through the element, in amperes (or an SI string like '10mA', '470uA'). Provide exactly two of voltage/current/resistance/power."
[[tools.exposes.params]]
name        = "resistance"
kind        = "number"
required    = false
description  = "Resistance, in ohms (or an SI string like '2.2kohm', '2kΩ'); must be non-negative. Provide exactly two of voltage/current/resistance/power."
[[tools.exposes.params]]
name        = "power"
kind        = "number"
required    = false
description  = "Power dissipated, in watts (or an SI string like '0.25W'); must be non-negative. Provide exactly two of voltage/current/resistance/power."
