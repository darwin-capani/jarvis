[app]
name        = "urlparse"
version     = "0.1.0"
description = "RFC-3986 URL/URI dissector via stdlib urllib.parse — never fetches. Pure, offline."
entry       = "apps/urlparse/main.py"
runtime     = "python"

[permissions]
audio     = false
gpu       = false
net_hosts = []
fs_read   = ["apps/urlparse"]
fs_write  = ["state/apps/urlparse"]

[ui]
surface          = "panel"
telemetry_topics = ["urlparse.status"]

[intents]
provides = ["url.dissect"]

[[tools.exposes]]
name          = "url.dissect"
scopes        = ["fs_read"]
consequential = false
description   = "Dissect an RFC-3986 URL/URI string into its parts (scheme, host, port with scheme-default inference, path, query, fragment, parsed query params, IDN/punycode host, a normalized form, and security warnings). Parsing only — never fetches the URL. Call to inspect or explain the structure of a URL without visiting it."
[[tools.exposes.params]]
name        = "url"
kind        = "string"
required    = true
description  = "The URL or URI string to dissect (e.g. \"https://user@host:8443/path?a=1#frag\"). A scheme-less string still parses. Must be a non-empty string."
