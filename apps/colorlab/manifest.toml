[app]
name        = "colorlab"
version     = "0.1.0"
description = "Read-only color science panel: normalize a color to hex/rgb/hsl, compute relative luminance and WCAG contrast ratios vs white and black with AA/AAA pass flags. Pure, offline."
entry       = "apps/colorlab/main.py"
runtime     = "python"

[permissions]
audio     = false
gpu       = false
net_hosts = []
fs_read   = ["apps/colorlab", "apps/_sdk"]
fs_write  = ["state/apps/colorlab"]

[ui]
surface          = "panel"
telemetry_topics = ["colorlab.status"]

[intents]
provides = ["colorlab.analyze"]

[[tools.exposes]]
name          = "colorlab.analyze"
scopes        = ["fs_read"]
consequential = false
description   = "Analyze a single color: normalize it to hex/rgb/hsl and compute its WCAG relative luminance plus contrast ratios against white and black with AA/AAA pass flags. Call it to check color legibility or convert a color between hex and rgb/hsl."

[[tools.exposes.params]]
name        = "color"
kind        = "string"
required    = true
description  = "The color to analyze, as a hex string ('#rgb' or '#rrggbb') or a comma-separated 'r,g,b' triplet of 0-255 integers."
