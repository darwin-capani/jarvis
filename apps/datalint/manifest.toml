[app]
name        = "datalint"
version     = "0.1.0"
description = "Read-only JSON inspector/validator panel: validity, parse error, root type, top-level key count, node count, and max nesting depth. Pure, offline (json stdlib only)."
entry       = "apps/datalint/main.py"
runtime     = "python"

[permissions]
audio     = false
gpu       = false
net_hosts = []
fs_read   = ["apps/datalint", "apps/_sdk"]
fs_write  = ["state/apps/datalint"]

[ui]
surface          = "panel"
telemetry_topics = ["datalint.status"]

[intents]
provides = ["datalint.inspect"]

[[tools.exposes]]
name          = "datalint.inspect"
scopes        = ["fs_read"]
consequential = false
description   = "Inspect a JSON string and report its structure: whether it parses (or the parse error), the root type, top-level key/element count, total node count, and maximum nesting depth. Call it to validate JSON text or gauge how big/deep a JSON document is."

[[tools.exposes.params]]
name        = "json"
kind        = "string"
required    = true
description  = "The JSON text to parse and inspect. An empty or unparseable string is reported back as {valid:false, error}."
