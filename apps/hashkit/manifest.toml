[app]
name        = "hashkit"
version     = "0.1.0"
description = "Read-only cryptographic-digest panel: MD5 / SHA1 / SHA256 of the input text plus its byte length. Uses only the Python stdlib hashlib. Offline."
entry       = "apps/hashkit/main.py"
runtime     = "python"

[permissions]
audio     = false
gpu       = false
net_hosts = []
fs_read   = ["apps/hashkit"]
fs_write  = ["state/apps/hashkit"]

[ui]
surface          = "panel"
telemetry_topics = ["hashkit.status"]

[intents]
provides = ["hashkit.digest"]

# THE AGENT-TOOL CONTRACT: a non-consequential declaration here is OFFERED TO THE
# AGENT LOOP as an invocable app__<tool> def ([apps].agent_tools, ships ON), so
# every declared tool MUST be served by handle() with the request-id echo (see
# main.py reply_result) — a declared-but-unserved tool would be offered to the
# model and time out. `description` becomes the model-facing tool description
# verbatim; each [[tools.exposes.params]] renders into the def's input_schema
# (name/kind/required/description; kind is a JSON-Schema primitive; the reserved
# envelope names `type`/`op`/`id`/`token` are rejected at validation).
[[tools.exposes]]
name          = "hashkit.digest"
scopes        = ["fs_read"]
consequential = false
description   = "Compute the MD5, SHA1, and SHA256 hex digests of a text string plus its UTF-8 byte length. Call when the user wants a one-way cryptographic digest or fingerprint of some text."

[[tools.exposes.params]]
name        = "text"
kind        = "string"
required    = false
description  = "The input text to digest. Omitted or non-string is treated as the empty string (digests of zero bytes)."
