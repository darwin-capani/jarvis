[app]
name        = "cidrtool"
version     = "0.1.0"
description = "Read-only CIDR aggregation and overlap analysis: collapses a mixed IPv4/IPv6 CIDR list to the minimal covering prefix set and reports subnet/supernet relations. Uses only the Python stdlib ipaddress. Pure, offline."
entry       = "apps/cidrtool/main.py"
runtime     = "python"

[permissions]
audio     = false
gpu       = false
net_hosts = []
fs_read   = ["apps/cidrtool", "apps/_sdk"]
fs_write  = ["state/apps/cidrtool"]

[ui]
surface          = "panel"
telemetry_topics = ["cidrtool.status"]

[intents]
provides = ["cidr.aggregate"]

[[tools.exposes]]
name          = "cidr.aggregate"
scopes        = ["fs_read"]
consequential = false
description   = "Aggregate a list of IPv4/IPv6 CIDRs (or bare IPs) into the minimal covering prefix set and report every subnet/supernet overlap pair plus per-family address totals. Call to collapse or de-duplicate a set of network ranges or to check whether ranges contain one another."
[[tools.exposes.params]]
name        = "cidrs"
kind        = "array"
required    = true
description  = "Non-empty list of CIDR strings and/or bare IP strings (mixed IPv4/IPv6 allowed), e.g. [\"10.0.0.0/8\", \"10.1.0.0/16\", \"8.8.8.8\"]."
