[app]
name        = "textkit"
version     = "0.1.0"
description = "Read-only text-statistics panel: character/word/sentence counts, average + longest word, unique words, and a words-per-sentence readability proxy. Pure, offline."
entry       = "apps/textkit/main.py"
runtime     = "python"

[permissions]
audio     = false
gpu       = false
net_hosts = []
fs_read   = ["apps/textkit", "apps/_sdk"]
fs_write  = ["state/apps/textkit"]

[ui]
surface          = "panel"
telemetry_topics = ["textkit.status"]

[intents]
provides = ["textkit.stats"]

[[tools.exposes]]
name          = "textkit.stats"
scopes        = ["fs_read"]
consequential = false
description   = "Compute read-only statistics for a passage of text: character/word/sentence counts, average and longest word, unique-word count, and a words-per-sentence readability proxy. Call to measure or analyze a piece of text."

[[tools.exposes.params]]
name        = "text"
kind        = "string"
required    = false
description  = "The text to analyze. Words are whitespace-delimited tokens; sentences are counted by .!? terminators. Absent or empty yields zeroed statistics."
