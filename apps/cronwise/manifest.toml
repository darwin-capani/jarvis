[app]
name        = "cronwise"
version     = "0.1.0"
description = "Read-only cron expression explainer: parse a standard 5-field cron string and describe each field in plain English, with a validity check. Pure, offline."
entry       = "apps/cronwise/main.py"
runtime     = "python"

[permissions]
audio     = false
gpu       = false
net_hosts = []
fs_read   = ["apps/cronwise"]
fs_write  = ["state/apps/cronwise"]

[ui]
surface          = "panel"
telemetry_topics = ["cronwise.status"]

[intents]
provides = ["cronwise.explain"]

[[tools.exposes]]
name          = "cronwise.explain"
scopes        = ["fs_read"]
consequential = false
description   = "Explain a standard 5-field cron expression in plain English: describe each field (minute, hour, day-of-month, month, day-of-week) and return a validity check. Call when the user asks what a cron string means or wants a cron schedule validated."

[[tools.exposes.params]]
name        = "cron"
kind        = "string"
required    = true
description  = "The standard 5-field cron expression to explain, e.g. \"*/5 * * * *\" or \"30 9-17 * * 1-5\" (minute hour day-of-month month day-of-week)."
