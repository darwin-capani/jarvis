[app]
name        = "jwtpeek"
version     = "0.1.0"
description = "Read-only JWT inspector: base64url-decode a JWT header and payload for inspection. Does NOT verify the signature (no secret). Pure, offline."
entry       = "apps/jwtpeek/main.py"
runtime     = "python"

[permissions]
audio     = false
gpu       = false
net_hosts = []
fs_read   = ["apps/jwtpeek"]
fs_write  = ["state/apps/jwtpeek"]

[ui]
surface          = "panel"
telemetry_topics = ["jwtpeek.status"]

[intents]
provides = ["jwtpeek.decode"]

[[tools.exposes]]
name          = "jwtpeek.decode"
scopes        = ["fs_read"]
consequential = false
description   = "Decode a JWT for inspection: base64url-decode and JSON-parse the header (part 0) and claims payload (part 1) of a header.payload.signature token, and report whether a signature segment is present. Does NOT verify the signature and handles no secret. Call when the user wants to read or inspect the contents of a JSON Web Token."

[[tools.exposes.params]]
name        = "jwt"
kind        = "string"
required    = true
description  = "The JWT to decode: a header.payload.signature string of three dot-separated base64url segments, e.g. \"eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiIxMjM0In0.c2ln\"."
