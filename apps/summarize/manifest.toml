[app]
name        = "summarize"
version     = "0.1.0"
description = "On-device AI text summarizer: condense text to a short summary using the local LLM. Offline, no cloud."
entry       = "apps/summarize/main.py"
runtime     = "python"

[permissions]
audio     = false
gpu       = false
net_hosts = []
fs_read   = ["state/ipc/apps/generate.sock", "apps/summarize"]
fs_write  = ["state/apps/summarize"]

[ui]
surface          = "panel"
telemetry_topics = ["summarize.status"]

[intents]
provides = ["summarize.run"]

[[tools.exposes]]
name          = "summarize.run"
scopes        = ["generate"]
consequential = false
