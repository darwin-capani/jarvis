[app]
name        = "timewarp"
version     = "0.1.0"
description = "Read-only epoch converter: turn a Unix timestamp into a UTC ISO-8601 string and its calendar components. Pure, offline."
entry       = "apps/timewarp/main.py"
runtime     = "python"

[permissions]
audio     = false
gpu       = false
net_hosts = []
fs_read   = ["apps/timewarp"]
fs_write  = ["state/apps/timewarp"]

[ui]
surface          = "panel"
telemetry_topics = ["timewarp.status"]

[intents]
provides = ["timewarp.convert"]

[[tools.exposes]]
name          = "timewarp.convert"
scopes        = ["fs_read"]
consequential = false
description   = "Convert a Unix epoch timestamp (seconds since 1970 UTC) into a UTC ISO-8601 string plus its calendar components (year, month, day, hour, minute, second, and weekday). Call when given an epoch and asked for the human-readable UTC date/time."

[[tools.exposes.params]]
name        = "epoch"
kind        = "number"
required    = true
description = "Unix timestamp in seconds since 1970-01-01 UTC. Accepts an integer, a float, or a numeric string; booleans and containers are rejected."
